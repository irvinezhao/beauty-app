<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽小站 - 美容项目管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #EC4899; 
            --primary-light: #FDF2F8; 
            --primary-dark: #831843; 
            --secondary: #F9A8D4;
            --cta: #8B5CF6;
            --text: #1E1B4B; 
            --text-light: #6B7280; 
            --bg: #FDF2F8; 
            --card-bg: #FFFFFF; 
            --shadow: 0 4px 20px rgba(236, 72, 153, 0.12); 
            --radius: 16px; 
            --font-title: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }
        [data-theme="dark"] { --text: #f5f5f5; --text-light: #aaa; --bg: #1a1a1a; --card-bg: #2d2d2d; --shadow: 0 2px 12px rgba(0,0,0,0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body), -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 80px; transition: all 0.3s ease; }
        h1, h2, h3, h4 { font-family: var(--font-title), serif; font-weight: 600; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, var(--cta) 100%); }
        .btn { transition: all 0.2s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(236, 72, 153, 0.3); }
        .header { background: linear-gradient(135deg, var(--primary) 0%, #ff6b9d 100%); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .admin-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .dark-mode-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; }
        .tabs { display: flex; background: var(--card-bg); position: sticky; top: 60px; z-index: 99; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 16px 8px; text-align: center; font-size: 14px; color: var(--text-light); cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); font-weight: 600; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--primary); border-radius: 2px; }
        .content { padding: 16px; }
        .page { display: none; }
        .page.active { display: block; }
        .project-grid { column-count: 2; column-gap: 12px; }
        .project-card { break-inside: avoid; margin-bottom: 12px; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s; }
        .project-card:active { transform: scale(0.98); }
        .project-card img { width: 100%; display: block; }
        .project-info { padding: 12px; }
        .project-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .project-desc { font-size: 12px; color: var(--text-light); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .project-price { font-size: 16px; font-weight: 700; color: var(--primary); }
        .detail-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 1000; overflow-y: auto; }
        .detail-page.active { display: block; }
        .detail-header { background: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
        .detail-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .detail-content { padding: 20px; }
        .detail-cover { width: 100%; border-radius: var(--radius); margin-bottom: 20px; }
        .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .detail-price { font-size: 24px; color: var(--primary); font-weight: 700; margin-bottom: 20px; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .detail-text { font-size: 14px; line-height: 1.8; color: var(--text-light); }
        .detail-images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .detail-images img { width: 100%; border-radius: 12px; }
        .booking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .booking-header h2 { font-size: 18px; }
        .booking-date { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 16px; }
        .date-item { min-width: 50px; padding: 10px 8px; background: var(--card-bg); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); }
        .date-item.active { background: var(--primary); color: white; }
        .date-day { font-size: 12px; }
        .date-num { font-size: 18px; font-weight: 600; }
        .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .time-slot { padding: 16px 12px; background: var(--card-bg); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s; }
        .time-slot:hover { transform: scale(1.02); }
        .time-slot.booked { background: #f0f0f0; color: #999; cursor: not-allowed; }
        .time-slot.selected { background: var(--primary); color: white; }
        .slot-time { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .slot-status { font-size: 11px; }
        .booking-modal, .login-page, .project-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .booking-modal.active, .login-page.active, .project-modal.active { display: flex; }
        .login-page { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); flex-direction: column; padding: 20px; }
        .project-modal { overflow-y: auto; padding: 20px; }
        .booking-modal-content, .project-modal-content { background: var(--card-bg); border-radius: 20px; padding: 24px; width: 90%; max-width: 360px; }
        .project-modal-content { max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .login-card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 320px; text-align: center; }
        .login-card h2 { color: var(--primary); margin-bottom: 8px; }
        .login-card p { color: var(--text-light); font-size: 14px; margin-bottom: 24px; }
        .booking-modal h3, .project-modal h3 { margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; margin-top: 10px; }
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--primary); }
        .timeline-item { position: relative; margin-bottom: 24px; padding: 16px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); }
        .timeline-item::before { content: ''; position: absolute; left: -20px; top: 20px; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; border: 3px solid var(--bg); }
        .timeline-date { font-size: 13px; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        .timeline-projects { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .timeline-tag { padding: 6px 12px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-size: 13px; }
        .timeline-photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .timeline-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .admin-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 1500; overflow-y: auto; }
        .admin-page.active { display: block; }
        .admin-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { font-size: 18px; }
        .admin-content { padding: 20px; }
        .admin-section { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .admin-section h3 { font-size: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .admin-list-item:last-child { border-bottom: none; }
        .admin-item-info h4 { font-size: 15px; margin-bottom: 4px; }
        .admin-item-info p { font-size: 12px; color: var(--text-light); }
        .admin-item-actions { display: flex; gap: 8px; }
        .admin-btn-small { padding: 6px 12px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; }
        .admin-btn-edit { background: #2196F3; color: white; }
        .admin-btn-delete { background: #f44336; color: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>
    <div class="header" id="userHeader">
        <div class="header-content">
            <h1>✨ 美丽小站</h1>
            <div class="header-right">
                <button class="admin-btn" id="userLoginBtn" onclick="openUserLogin()">登录</button>
                <button class="admin-btn" onclick="openAdminLogin()">商家入口</button>
                <button class="dark-mode-btn" id="darkModeBtn" title="切换深色模式">🌙</button>
            </div>
        </div>
    </div>
    
    <div class="tabs" id="userTabs">
        <div class="tab active" data-tab="projects">项目</div>
        <div class="tab" data-tab="booking">预约</div>
        <div class="tab" data-tab="community">社区</div>
        <div class="tab" data-tab="timeline">记录</div>
        <div class="tab" data-tab="profile">我的</div>
    </div>
    
    <div class="content" id="userContent">
        <div class="page active" id="projects"><div class="project-grid" id="projectGrid"></div></div>
        <div class="page" id="booking">
            <div class="booking-header"><h2>📅 可预约时间</h2></div>
            <div class="booking-date" id="bookingDate"></div>
            <div class="time-slots" id="timeSlots"></div>
        </div>
        <div class="page" id="timeline"><div class="timeline" id="timelineList"></div></div>
        
        <!-- 我的页面 -->
        <div class="page" id="profile">
            <div id="profileContent"></div>
        </div>
        
        <!-- 社区页面 -->
        <div class="page" id="community">
            <div id="communityView"></div>
        </div>
        
        <!-- 社区发帖页 -->
        <div class="detail-page" id="postPage">
            <div class="detail-header">
                <button onclick="goCommunity()">←</button>
                <span>发布新帖</span>
            </div>
            <div class="detail-content">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="postTitle2" placeholder="请输入标题" style="width:100%;padding:12px;border:1px solid #eee;border-radius:10px">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="postContent2" placeholder="分享你的美容心得..." rows="6" style="width:100%;padding:12px;border:1px solid #eee;border-radius:10px"></textarea>
                </div>
                <div class="form-group">
                    <label>图片（可选）</label>
                    <input type="file" id="postImages2" accept="image/*" multiple>
                </div>
                <button class="btn" onclick="submitPost2()">发布</button>
            </div>
        </div>
        
        <!-- 社区帖子详情页 -->
        <div class="detail-page" id="postDetailPage">
            <div class="detail-header">
                <button onclick="goCommunity()">←</button>
                <span>帖子详情</span>
            </div>
            <div class="detail-content" id="postDetailContent"></div>
        </div>
    </div>
    
    <div class="detail-page" id="detailPage">
        <div class="detail-header"><button onclick="closeDetail()">←</button><span>项目详情</span></div>
        <div class="detail-content" id="detailContent"></div>
    </div>
    
    <!-- 充值方案弹窗 -->
    <div class="detail-page" id="rechargeModal">
        <div class="detail-header">
            <button onclick="closeRechargeModal()">←</button>
            <span>充值方案</span>
        </div>
        <div class="detail-content">
            <div class="form-group"><label>充值金额</label><input type="number" id="rechargeAmount" placeholder="如：1000"></div>
            <div class="form-group"><label>赠送金额</label><input type="number" id="rechargeBonus" placeholder="如：100"></div>
            <button class="btn" onclick="saveRecharge()">保存</button>
        </div>
    </div>
    
    <!-- 优惠券弹窗 -->
    <div class="detail-page" id="couponModal">
        <div class="detail-header">
            <button onclick="closeCouponModal()">←</button>
            <span>优惠券</span>
        </div>
        <div class="detail-content">
            <div class="form-group"><label>优惠券名称</label><input type="text" id="couponName" placeholder="如：满100减20"></div>
            <div class="form-group"><label>优惠金额</label><input type="number" id="couponDiscount" placeholder="如：20"></div>
            <div class="form-group"><label>使用门槛</label><input type="number" id="couponMinSpend" placeholder="如：100（0为无门槛）"></div>
            <div class="form-group"><label>有效期（天）</label><input type="number" id="couponExpireDays" placeholder="如：30"></div>
            <button class="btn" onclick="saveCoupon()">保存</button>
        </div>
    </div>
    
    <div class="booking-modal" id="bookingModal">
        <div class="booking-modal-content">
            <h3>📅 确认预约</h3>
            <div class="form-group"><label>您的姓名</label><input type="text" id="bookingName" placeholder="请输入姓名"></div>
            <div class="form-group"><label>联系方式</label><input type="tel" id="bookingPhone" placeholder="请输入手机号"></div>
            <div class="form-group"><label>备注</label><textarea id="bookingNote" placeholder="可选" rows="2"></textarea></div>
            <button class="btn" onclick="confirmBooking()">确认预约</button>
            <button class="btn btn-secondary" onclick="closeBookingModal()">取消</button>
        </div>
    </div>
    
    <!-- 用户登录弹窗 -->
    <div class="login-page" id="userLoginPage" style="z-index:3000">
        <div class="login-card">
            <h2>👤 用户登录</h2>
            <p>登录后可查看预约记录</p>
            
            <div class="form-group"><label>手机号</label><input type="tel" id="userLoginPhone" placeholder="请输入手机号"></div>
            <div class="form-group">
                <label>验证码</label>
                <div style="display:flex;gap:8px">
                    <input type="text" id="userLoginCode" placeholder="请输入验证码" style="flex:1">
                    <button type="button" id="userSendCodeBtn" onclick="sendUserCode()" style="width:auto;padding:12px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px">发送验证码</button>
                </div>
            </div>
            <button class="btn" onclick="userLogin()">登录</button>
        </div>
    </div>
    
    <div class="login-page" id="loginPage" style="z-index:2500">
        <div class="login-card">
            <h2>🔐 商家后台</h2>
            <p id="loginSubtitle">请输入手机号登录</p>
            
            <!-- 手机号登录 -->
            <div id="phoneLoginForm">
                <div class="form-group"><label>手机号</label><input type="tel" id="loginPhone" placeholder="请输入手机号"></div>
                <div class="form-group">
                    <label>验证码</label>
                    <div style="display:flex;gap:8px">
                        <input type="text" id="loginCode" placeholder="请输入验证码" style="flex:1">
                        <button type="button" id="sendCodeBtn" onclick="sendCode()" style="width:auto;padding:12px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px">发送验证码</button>
                    </div>
                </div>
                <button class="btn" onclick="loginWithCode()">登录</button>
                <button class="btn btn-secondary" onclick="showPasswordLogin()" style="margin-top:8px">用账号密码登录</button>
            </div>
            
            <!-- 账号密码登录 -->
            <div id="passwordLoginForm" style="display:none">
                <div class="form-group"><label>账号</label><input type="text" id="loginUsername" placeholder="请输入账号"></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
                <button class="btn" onclick="loginWithPassword()">登录</button>
                <button class="btn btn-secondary" onclick="showPhoneLogin()" style="margin-top:8px">用手机号登录</button>
            </div>
        </div>
    </div>
    
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h2>🏪 商家后台</h2>
            <button class="admin-btn" onclick="logoutAdmin()">退出登录</button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h3>👥 用户管理 <button class="admin-btn-small admin-btn-edit" onclick="openUserList()">查看用户</button></h3>
                <div id="adminUserStats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px;background:var(--bg);border-radius:12px">
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalUsers">0</div><div style="font-size:12px;color:var(--text-light)">总用户</div></div>
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalRevenue">¥0</div><div style="font-size:12px;color:var(--text-light)">总消费</div></div>
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalBalance">¥0</div><div style="font-size:12px;color:var(--text-light)">储值余额</div></div>
                </div>
            </div>
            
            <div class="admin-section">
                <h3>美容项目 <button class="admin-btn-small admin-btn-edit" onclick="openProjectModal()">+ 添加项目</button></h3>
                <div id="adminProjectList"></div>
            </div>
            <div class="admin-section">
                <h3>
                    预约设置
                    <button class="admin-btn-small admin-btn-edit" onclick="openSettingsModal()">⚙️ 设置</button>
                </h3>
                <div style="padding:12px;background:var(--bg);border-radius:12px;margin-bottom:12px">
                    <p style="font-size:13px;margin-bottom:8px">📅 服务时间：<span id="serviceHoursDisplay">10:00 - 22:00</span></p>
                    <p style="font-size:13px">⏱️ 服务时长：<span id="serviceDurationDisplay">60</span>分钟/次</p>
                </div>
                <h4 style="font-size:14px;margin-bottom:12px">📆 预约日历</h4>
                <div class="booking-date" id="adminBookingDate"></div>
                <div class="time-slots" id="adminTimeSlots"></div>
                <h4 style="font-size:14px;margin:16px 0 12px">📋 预约列表</h4>
                <div id="adminBookingList"></div>
            </div>
            
            <!-- 充值管理 -->
            <div class="admin-section">
                <h3>
                    💰 充值管理
                    <button class="admin-btn-small admin-btn-edit" onclick="openRechargeModal()">+ 添加充值方案</button>
                </h3>
                <div id="rechargeList"></div>
            </div>
            
            <!-- 优惠券管理 -->
            <div class="admin-section">
                <h3>
                    🎫 优惠券管理
                    <button class="admin-btn-small admin-btn-edit" onclick="openCouponModal()">+ 添加优惠券</button>
                </h3>
                <div id="couponList"></div>
            </div>
        </div>
    </div>
    
    <!-- 设置弹窗 -->
    <div class="project-modal" id="settingsModal">
        <div class="project-modal-content">
            <h3>⚙️ 预约设置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>开始时间</label>
                    <select id="serviceStartTime">
                        <option value="6">06:00</option>
                        <option value="7">07:00</option>
                        <option value="8">08:00</option>
                        <option value="9">09:00</option>
                        <option value="10" selected>10:00</option>
                        <option value="11">11:00</option>
                        <option value="12">12:00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>结束时间</label>
                    <select id="serviceEndTime">
                        <option value="18">18:00</option>
                        <option value="19">19:00</option>
                        <option value="20">20:00</option>
                        <option value="21">21:00</option>
                        <option value="22" selected>22:00</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>服务时长（分钟）</label>
                <select id="serviceDuration">
                    <option value="30">30分钟</option>
                    <option value="45">45分钟</option>
                    <option value="60" selected>60分钟</option>
                    <option value="90">90分钟</option>
                    <option value="120">120分钟</option>
                </select>
            </div>
            <div class="form-group">
                <label>休业日（可多选）</label>
                <div style="display:flex;flex-wrap:wrap;gap:8px">

            if (!/^1\d{10}$/.test(phone)) return alert('请输入正确的手机号');
            
            // 生成6位验证码

            verificationCodes[phone] = { code, expires: Date.now() + 5 * 60 * 1000 }; // 5分钟有效
            
            // 模拟发送（实际需要短信接口）
            alert(`验证码已发送（测试码：${code}）`);
            
            // 倒计时
            let countdown = 60;
            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.textContent = `${countdown}s`;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);

        // 手机号验证码登录

            const code = document.getElementById('loginCode').value.trim();
            
            if (!phone || !code) return alert('请填写手机号和验证码');
            
            const stored = verificationCodes[phone];
            if (!stored) return alert('请先获取验证码');
            if (Date.now() > stored.expires) return alert('验证码已过期，请重新获取');

            const code = Math.floor(100000 + Math.random() * 900000).toString();
            verificationCodes[phone] = { code, expires: Date.now() + 5 * 60 * 1000 };
            
            alert(`验证码已发送（测试码：${code}）`);
            
            let countdown = 60;

            btn.disabled = true;

            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
        };
        
        window.userLogin = function() {
            const phone = document.getElementById('userLoginPhone').value.trim();
            const code = document.getElementById('userLoginCode').value.trim();
            
            if (!phone || !code) return alert('请填写手机号和验证码');
            
            const stored = verificationCodes[phone];
            if (!stored) return alert('请先获取验证码');
            if (Date.now() > stored.expires) return alert('验证码已过期');
            if (stored.code !== code) return alert('验证码错误');
            
            // 查找或创建用户
            let user = users.find(u => u.phone === phone);

                user = {
                    id: Date.now().toString(),

                    balance: 0,

            window.currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // 更新UI
            document.getElementById('userLoginBtn').textContent = user.name;
            document.getElementById('userLoginBtn').onclick = userLogout;
            
            alert('登录成功！');

        window.userLogout = function() {

        // 项目管理数据（本地存储）

        // 商家后台预约日历
        let adminSelectedDate = null;
        
        function renderAdminBookingCalendar() {
            const container = document.getElementById('adminBookingDate');
            const week = [];
            const today = new Date();
            for (let i = 0; i < 14; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                const dayOfWeek = date.getDay();
                const isOffDay = bookingSettings.offDays.includes(dayOfWeek);
                week.push({ 
                    day: ['日','一','二','三','四','五','六'][dayOfWeek], 
                    num: date.getDate(), 
                    full: date.toISOString().split('T')[0],
                    isOffDay,
                    month: date.getMonth() + 1
                });
            }
            
            container.innerHTML = week.map((d, i) => {
                const isSelected = adminSelectedDate === d.full;
                const isClosed = d.isOffDay || closedDates[d.full];
                return `<div class="date-item ${isSelected?'active':''} ${isClosed?'booked':''}" onclick="selectAdminDate('${d.full}', ${i})"><div class="date-day">${d.month}/${d.num} 周${d.day}</div><div class="date-num">${isClosed?'休':'可'}</div></div>`;
            }).join('');
            
            if (!adminSelectedDate) {
                adminSelectedDate = week.find(d => !d.isOffDay && !closedDates[d.full])?.full || week[0].full;
            }
            renderAdminTimeSlots();
        }
        
        function selectAdminDate(date, index) {
            adminSelectedDate = date;
            document.querySelectorAll('#adminBookingDate .date-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            renderAdminTimeSlots();
        }
        
        function renderAdminTimeSlots() {
            const container = document.getElementById('adminTimeSlots');
            if (!adminSelectedDate) return;
            
            const isClosed = closedDates[adminSelectedDate];
            if (isClosed) {
                container.innerHTML = '<p style="text-align:center;color:var(--text-light);padding:20px">今日已休业</p>';
                return;
            }
            
            const slots = [];
            for (let hour = bookingSettings.startTime; hour < bookingSettings.endTime; hour++) {
                slots.push({ hour, time: `${hour}:00` });
            }
            
            // 找出该日期的预约
            const dayBookings = window.adminBookings.filter(b => b.date === adminSelectedDate);
            
            container.innerHTML = slots.map(slot => {
                const booking = dayBookings.find(b => b.time === slot.time);
                if (booking) {
                    return `<div class="time-slot booked" style="text-align:left;padding:12px"><div style="font-weight:600">${slot.time}</div><div style="font-size:12px">${booking.name}</div><div style="font-size:11px;color:#666">${booking.phone}</div></div>`;
                }
                return `<div class="time-slot"><div class="slot-time">${slot.time}</div><div class="slot-status">可预约</div></div>`;
            }).join('');
        }

                viewUserDetail(userId);
            }
        }
        
        function addNewUserTag(userId) {
            const tag = prompt('请输入自定义标签：');
            if (tag) addUserTag(userId, tag);
        }
        
        function rechargeUser(userId) {
            const amount = parseInt(document.getElementById('rechargeAmount').value);
            if (!amount || amount <= 0) return alert('请输入有效金额');
            
            const user = users.find(u => u.id === userId);
            if (!user) return;
            
            user.balance = (user.balance || 0) + amount;
            user.totalSpent = (user.totalSpent || 0) + amount;
            
            localStorage.setItem('users', JSON.stringify(users));
            renderUserStats();
            viewUserDetail(userId);
        }
        
        // 用户预约时自动创建/更新用户
        function updateUserFromBooking(booking) {
            let user = users.find(u => u.phone === booking.phone);
            if (!user) {
                user = {
                    id: Date.now().toString(),
                    name: booking.name,
                    phone: booking.phone,
                    balance: 0,
                    totalSpent: 0,
                    tags: [],
                    createdAt: new Date().toISOString()
                };
                users.push(user);
            } else {
                user.name = booking.name;
            }
            localStorage.setItem('users', JSON.stringify(users));
            renderUserStats();
        }
        
        function openProjectModal(project = null) {
            window.editingProjectId = project ? project.id : null;
            document.getElementById('projectModalTitle').textContent = project ? '编辑项目' : '添加项目';
            document.getElementById('projectName').value = project ? project.title : '';
            document.getElementById('projectDesc').value = project ? project.desc : '';
            document.getElementById('projectPrice').value = project ? project.price : '';
            document.getElementById('projectCategory').value = project ? project.category : '护肤';
            // 文件输入不能预设值，清空并提示
            document.getElementById('projectCover').value = '';
            document.getElementById('projectDetailText').value = project ? project.detailText : '';
            document.getElementById('projectDetailImages').value = '';
            document.getElementById('projectModal').classList.add('active');
        }
        
        function closeProjectModal() { document.getElementById('projectModal').classList.remove('active'); window.editingProjectId = null; }
        
        function editProject(id) { const p = window.adminProjects.find(item => item.id === id); if (p) openProjectModal(p); }
        
        // 图片转Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // 处理多张图片
        async function handleDetailImages(files) {
            const base64Images = [];
            for (const file of files) {
                if (file.size > 2 * 1024 * 1024) {
                    alert('图片不能超过2MB');
                    continue;
                }
                const base64 = await fileToBase64(file);
                base64Images.push(base64);
            }
            return base64Images;
        }
        
        async function saveProject() {
            const title = document.getElementById('projectName').value.trim();
            const price = document.getElementById('projectPrice').value;
            if (!title || !price) return alert('请填写名称和价格');
            
            // 处理封面图片
            let coverBase64 = '';
            const coverFile = document.getElementById('projectCover').files[0];
            if (coverFile) {
                if (coverFile.size > 2 * 1024 * 1024) return alert('封面图片不能超过2MB');
                coverBase64 = await fileToBase64(coverFile);
            } else {
                // 如果没选新图片，保留原来的
                const existingProject = window.adminProjects.find(p => p.id === window.editingProjectId);
                if (existingProject) coverBase64 = existingProject.cover || '';
            }
            
            // 处理详情图片
            const detailFiles = document.getElementById('projectDetailImages').files;
            let detailImagesBase64 = [];
            if (detailFiles.length > 0) {
                detailImagesBase64 = await handleDetailImages(detailFiles);
            } else {
                const existingProject = window.adminProjects.find(p => p.id === window.editingProjectId);
                if (existingProject) detailImagesBase64 = existingProject.detailImages || [];
            }
            
            window.saveProjectToFirestore({ 
                title, 
                desc: document.getElementById('projectDesc').value, 
                price: parseInt(price), 
                category: document.getElementById('projectCategory').value, 
                cover: coverBase64, 
                detailText: document.getElementById('projectDetailText').value, 
                detailImages: detailImagesBase64 
            });
        }
        
        renderUserProjects();
        renderBookingDates();
        renderTimeSlots();
        renderTimeline();
        renderProfile();
        renderCommunity();
        
        // 检查管理员登录状态
        if (isLoggedIn) {
            document.getElementById('adminPage').classList.add('active');
            renderAdminProjects();
            renderAdminBookingCalendar();
            document.getElementById('serviceHoursDisplay').textContent = `${bookingSettings.startTime}:00 - ${bookingSettings.endTime}:00`;
            document.getElementById('serviceDurationDisplay').textContent = bookingSettings.duration;
            renderAdminBookings();
        }
    </script>
</body>
</html>
