<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽小站 - 美容项目管理</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    </style>
</head>
<body>
    <div class="header" id="userHeader">
        <div class="header-content">
            <h1>✨ 美丽小站</h1>
            <div class="header-right">
                <button class="admin-btn" id="userLoginBtn" onclick="openUserLogin()">登录</button>
                <button class="admin-btn" onclick="openAdminLogin()">商家入口</button>
                <button class="dark-mode-btn" id="darkModeBtn" title="切换深色模式">🌙</button>
            </div>
        </div>
    </div>
    
    <div class="tabs" id="userTabs">
        <div class="tab active" data-tab="projects">项目</div>
        <div class="tab" data-tab="booking">预约</div>
        <div class="tab" data-tab="community">社区</div>
        <div class="tab" data-tab="timeline">记录</div>
        <div class="tab" data-tab="profile">我的</div>
    </div>
    
    <div class="content" id="userContent">
        <div class="page active" id="projects"><div class="project-grid" id="projectGrid"></div></div>
        <div class="page" id="booking">
            <div class="booking-header"><h2>📅 可预约时间</h2></div>
            <div class="booking-date" id="bookingDate"></div>
            <div class="time-slots" id="timeSlots"></div>
        </div>
        <div class="page" id="timeline"><div class="timeline" id="timelineList"></div></div>
        
        <!-- 我的页面 -->
        <div class="page" id="profile">
            <div id="profileContent"></div>
        </div>
        
        <!-- 社区页面 -->
        <div class="page" id="community">
            <div id="communityView"></div>
        </div>
        
        <!-- 社区发帖页 -->
        <div class="detail-page" id="postPage">
            <div class="detail-header">
                <button onclick="goCommunity()">←</button>
                <span>发布新帖</span>
            </div>
            <div class="detail-content">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="postTitle2" placeholder="请输入标题" style="width:100%;padding:12px;border:1px solid #eee;border-radius:10px">
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea id="postContent2" placeholder="分享你的美容心得..." rows="6" style="width:100%;padding:12px;border:1px solid #eee;border-radius:10px"></textarea>
                </div>
                <div class="form-group">
                    <label>图片（可选）</label>
                    <input type="file" id="postImages2" accept="image/*" multiple>
                </div>
                <button class="btn" onclick="submitPost2()">发布</button>
            </div>
        </div>
        
        <!-- 社区帖子详情页 -->
        <div class="detail-page" id="postDetailPage">
            <div class="detail-header">
                <button onclick="goCommunity()">←</button>
                <span>帖子详情</span>
            </div>
            <div class="detail-content" id="postDetailContent"></div>
        </div>
    </div>
    
    <div class="detail-page" id="detailPage">
        <div class="detail-header"><button onclick="closeDetail()">←</button><span>项目详情</span></div>
        <div class="detail-content" id="detailContent"></div>
    </div>
    
    <!-- 充值方案弹窗 -->
    <div class="detail-page" id="rechargeModal">
        <div class="detail-header">
            <button onclick="closeRechargeModal()">←</button>
            <span>充值方案</span>
        </div>
        <div class="detail-content">
            <div class="form-group"><label>充值金额</label><input type="number" id="rechargeAmount" placeholder="如：1000"></div>
            <div class="form-group"><label>赠送金额</label><input type="number" id="rechargeBonus" placeholder="如：100"></div>
            <button class="btn" onclick="saveRecharge()">保存</button>
        </div>
    </div>
    
    <!-- 优惠券弹窗 -->
    <div class="detail-page" id="couponModal">
        <div class="detail-header">
            <button onclick="closeCouponModal()">←</button>
            <span>优惠券</span>
        </div>
        <div class="detail-content">
            <div class="form-group"><label>优惠券名称</label><input type="text" id="couponName" placeholder="如：满100减20"></div>
            <div class="form-group"><label>优惠金额</label><input type="number" id="couponDiscount" placeholder="如：20"></div>
            <div class="form-group"><label>使用门槛</label><input type="number" id="couponMinSpend" placeholder="如：100（0为无门槛）"></div>
            <div class="form-group"><label>有效期（天）</label><input type="number" id="couponExpireDays" placeholder="如：30"></div>
            <button class="btn" onclick="saveCoupon()">保存</button>
        </div>
    </div>
    
    <!-- 打折弹窗 -->
    <div class="detail-page" id="discountModal">
        <div class="detail-header">
            <button onclick="closeDiscountModal()">←</button>
            <span>打折配置</span>
        </div>
        <div class="detail-content">
            <div class="form-group">
                <label>折扣类型</label>
                <select id="discountType" onchange="toggleDiscountType()">
                    <option value="fixed">一口价（固定金额）</option>
                    <option value="percent">百分比折扣</option>
                </select>
            </div>
            <div class="form-group" id="fixedPriceGroup">
                <label>一口价金额</label>
                <input type="number" id="fixedPrice" placeholder="如：199">
            </div>
            <div class="form-group" id="percentGroup" style="display:none">
                <label>折扣比例（1-100）</label>
                <input type="number" id="discountPercent" placeholder="如：80表示8折">
            </div>
            <div class="form-group">
                <label>选择项目（可多选）</label>
                <div id="discountProjectSelect" style="max-height:150px;overflow-y:auto"></div>
            </div>
            <button class="btn" onclick="saveDiscount()">保存</button>
        </div>
    </div>
    
    <div class="booking-modal" id="bookingModal">
        <div class="booking-modal-content">
            <h3>📅 确认预约</h3>
            <div class="form-group"><label>您的姓名</label><input type="text" id="bookingName" placeholder="请输入姓名"></div>
            <div class="form-group"><label>联系方式</label><input type="tel" id="bookingPhone" placeholder="请输入手机号"></div>
            <div class="form-group"><label>备注</label><textarea id="bookingNote" placeholder="可选" rows="2"></textarea></div>
            <button class="btn" onclick="confirmBooking()">确认预约</button>
            <button class="btn btn-secondary" onclick="closeBookingModal()">取消</button>
        </div>
    </div>
    
    <!-- 用户登录弹窗 -->
    <div class="login-page" id="userLoginPage" style="z-index:3000">
        <div class="login-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2>👤 用户登录</h2>
                <button onclick="closeUserLogin()" style="background:none;border:none;font-size:24px;cursor:pointer">×</button>
            </div>
            <p>登录后可查看预约记录</p>
            
            <div class="form-group"><label>手机号</label><input type="tel" id="userLoginPhone" placeholder="请输入手机号"></div>
            <div class="form-group">
                <label>验证码</label>
                <div style="display:flex;gap:8px">
                    <input type="text" id="userLoginCode" placeholder="请输入验证码" style="flex:1">
                    <button type="button" id="userSendCodeBtn" onclick="sendUserCode()" style="width:auto;padding:12px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px">发送验证码</button>
                </div>
            </div>
            <button class="btn" onclick="userLogin()">登录</button>
        </div>
    </div>
    
    <div class="login-page" id="loginPage" style="z-index:2500">
        <div class="login-card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2>🔐 商家后台</h2>
                <button onclick="closeAdminLogin()" style="background:none;border:none;font-size:24px;cursor:pointer">×</button>
            </div>
            <p id="loginSubtitle">请输入手机号登录</p>
            
            <!-- 手机号登录 -->
            <div id="phoneLoginForm">
                <div class="form-group"><label>手机号</label><input type="tel" id="adminLoginPhone" placeholder="请输入手机号"></div>
                <div class="form-group">
                    <label>验证码</label>
                    <div style="display:flex;gap:8px">
                        <input type="text" id="adminLoginCode" placeholder="请输入验证码" style="flex:1">
                        <button type="button" id="adminSendCodeBtn" onclick="adminSendCode()" style="width:auto;padding:12px;background:var(--primary);color:white;border:none;border-radius:10px;font-size:13px">发送验证码</button>
                    </div>
                </div>
                <button class="btn" onclick="adminLogin()">登录</button>
                <button class="btn btn-secondary" onclick="showPasswordLogin()" style="margin-top:8px">用账号密码登录</button>
            </div>
            
            <!-- 账号密码登录 -->
            <div id="passwordLoginForm" style="display:none">
                <div class="form-group"><label>账号</label><input type="text" id="loginUsername" placeholder="请输入账号"></div>
                <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
                <button class="btn" onclick="loginWithPassword()">登录</button>
                <button class="btn btn-secondary" onclick="showPhoneLogin()" style="margin-top:8px">用手机号登录</button>
            </div>
        </div>
    </div>
    
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h2>🏪 商家后台</h2>
            <button class="admin-btn" onclick="logoutAdmin()">退出登录</button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h3>👥 用户管理 <button class="admin-btn-small admin-btn-edit" onclick="openUserList()">查看用户</button></h3>
                <div id="adminUserStats" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px;background:var(--bg);border-radius:12px">
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalUsers">0</div><div style="font-size:12px;color:var(--text-light)">总用户</div></div>
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalRevenue">¥0</div><div style="font-size:12px;color:var(--text-light)">总消费</div></div>
                    <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--primary)" id="totalBalance">¥0</div><div style="font-size:12px;color:var(--text-light)">储值余额</div></div>
                </div>
            </div>
            
            <div class="admin-section">
                <h3>美容项目 <button class="admin-btn-small admin-btn-edit" onclick="openProjectModal()">+ 添加项目</button></h3>
                <div id="adminProjectList"></div>
            </div>
            <div class="admin-section">
                <h3>
                    预约设置
                    <button class="admin-btn-small admin-btn-edit" onclick="openSettingsModal()">⚙️ 设置</button>
                </h3>
                <div style="padding:12px;background:var(--bg);border-radius:12px;margin-bottom:12px">
                    <p style="font-size:13px;margin-bottom:8px">📅 服务时间：<span id="serviceHoursDisplay">10:00 - 22:00</span></p>
                    <p style="font-size:13px">⏱️ 服务时长：<span id="serviceDurationDisplay">60</span>分钟/次</p>
                </div>
                <h4 style="font-size:14px;margin-bottom:12px">📆 预约日历</h4>
                <div class="booking-date" id="adminBookingDate"></div>
                <div class="time-slots" id="adminTimeSlots"></div>
                <h4 style="font-size:14px;margin:16px 0 12px">📋 预约列表</h4>
                <div id="adminBookingList"></div>
            </div>
            
            <!-- 充值管理 -->
            <div class="admin-section">
                <h3>
                    💰 充值管理
                    <button class="admin-btn-small admin-btn-edit" onclick="openRechargeModal()">+ 添加充值方案</button>
                </h3>
                <div id="rechargeList"></div>
            </div>
            
            <!-- 优惠券管理 -->
            <div class="admin-section">
                <h3>
                    🎫 优惠券管理
                    <button class="admin-btn-small admin-btn-edit" onclick="openCouponModal()">+ 添加优惠券</button>
                </h3>
                <div id="couponList"></div>
            </div>
            
            <!-- 打折配置 -->
            <div class="admin-section">
                <h3>
                    🏷️ 打折配置
                    <button class="admin-btn-small admin-btn-edit" onclick="openDiscountModal()">+ 添加折扣</button>
                </h3>
                <div id="discountList"></div>
            </div>
        </div>
    </div>
    
    <!-- 设置弹窗 -->
    <div class="project-modal" id="settingsModal">
        <div class="project-modal-content">
            <h3>⚙️ 预约设置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>开始时间</label>
                    <select id="serviceStartTime">
                        <option value="6">06:00</option>
                        <option value="7">07:00</option>
                        <option value="8">08:00</option>
                        <option value="9">09:00</option>
                        <option value="10" selected>10:00</option>
                        <option value="11">11:00</option>
                        <option value="12">12:00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>结束时间</label>
                    <select id="serviceEndTime">
                        <option value="18">18:00</option>
                        <option value="19">19:00</option>
                        <option value="20">20:00</option>
                        <option value="21">21:00</option>
                        <option value="22" selected>22:00</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>服务时长（分钟）</label>
                <select id="serviceDuration">
                    <option value="30">30分钟</option>
                    <option value="45">45分钟</option>
                    <option value="60" selected>60分钟</option>
                    <option value="90">90分钟</option>
                    <option value="120">120分钟</option>
                </select>
            </div>
            <div class="form-group">
                <label>休业日（可多选）</label>
                <div style="display:flex;flex-wrap:wrap;gap:8px">
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay0" value="0"> 周日</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay1" value="1"> 周一</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay2" value="2"> 周二</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay3" value="3"> 周三</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay4" value="4"> 周四</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay5" value="5"> 周五</label>
                    <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="offDay6" value="6"> 周六</label>
                </div>
            </div>
            <button class="btn" onclick="saveSettings()">保存设置</button>
            <button class="btn btn-secondary" onclick="closeSettingsModal()">取消</button>
        </div>
    </div>
    
    <!-- 用户列表弹窗 -->
    <div class="project-modal" id="userListModal">
        <div class="project-modal-content" style="max-width:500px;max-height:80vh">
            <h3>👥 用户列表</h3>
            <div style="max-height:60vh;overflow-y:auto" id="userListContent"></div>
            <button class="btn btn-secondary" onclick="closeUserListModal()">关闭</button>
        </div>
    </div>
    
    <!-- 用户详情弹窗 -->
    <div class="project-modal" id="userDetailModal">
        <div class="project-modal-content" style="max-width:600px;max-height:80vh;overflow-y:auto">
            <h3>👤 用户详情</h3>
            <div id="userDetailContent"></div>
            <button class="btn btn-secondary" onclick="closeUserDetailModal()">关闭</button>
        </div>
    </div>
    
    <!-- 发布帖子弹窗 -->
    <div class="project-modal" id="postModal">
        <div class="project-modal-content">
            <h3>📝 发布新帖</h3>
            <div class="form-group">
                <label>标题</label>
                <input type="text" id="postTitle" placeholder="请输入标题">
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="postContent" placeholder="分享你的美容心得..." rows="4"></textarea>
            </div>
            <div class="form-group">
                <label>图片（可选）</label>
                <input type="file" id="postImages" accept="image/*" multiple>
            </div>
            <button class="btn" onclick="submitPost()">发布</button>
            <button class="btn btn-secondary" onclick="closePostModal()">取消</button>
        </div>
    </div>
    
    <!-- 评论弹窗 -->
    <div class="project-modal" id="commentModal">
        <div class="project-modal-content">
            <h3>💬 评论</h3>
            <div id="commentsList" style="max-height:300px;overflow-y:auto;margin-bottom:16px"></div>
            <div class="form-group">
                <textarea id="commentText" placeholder="写下你的评论..." rows="2"></textarea>
            </div>
            <button class="btn" onclick="submitComment()">发表</button>
            <button class="btn btn-secondary" onclick="closeCommentModal()">关闭</button>
        </div>
    </div>
    
    <div class="project-modal" id="projectModal">
        <div class="project-modal-content">
            <h3 id="projectModalTitle">添加项目</h3>
            <div class="form-group"><label>项目名称 *</label><input type="text" id="projectName" placeholder="如：光子嫩肤"></div>
            <div class="form-group"><label>简介描述</label><textarea id="projectDesc" placeholder="简要描述" rows="2"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>价格 *</label><input type="number" id="projectPrice" placeholder="899"></div>
                <div class="form-group"><label>类别</label><select id="projectCategory"><option value="护肤">护肤</option><option value="美容">美容</option><option value="美甲">美甲</option><option value="美发">美发</option></select></div>
            </div>
            <div class="form-group"><label>封面图片</label><input type="file" id="projectCover" accept="image/*"></div>
            <div class="form-group"><label>详细介绍</label><textarea id="projectDetailText" placeholder="详细介绍内容" rows="4"></textarea></div>
            <div class="form-group"><label>详情图片（可多选）</label><input type="file" id="projectDetailImages" accept="image/*" multiple></div>
            <button class="btn" onclick="saveProject()">保存</button>
            <button class="btn btn-secondary" onclick="closeProjectModal()">取消</button>
        </div>
    </div>
    
    <script>
        // 预设管理员账号
        const ADMIN_USER = {
            username: 'admin',
            password: 'beauty123',
            name: '管理员'
        };
        
        let isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
        
        // 预约设置
        let bookingSettings = JSON.parse(localStorage.getItem('bookingSettings')) || {
            startTime: 10,
            endTime: 22,
            duration: 60,
            offDays: []
        };
        
        // 休业日
        let closedDates = JSON.parse(localStorage.getItem('closedDates')) || {};
        
        function initDarkMode() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('darkModeBtn').textContent = '☀️'; }
        }
        
        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); document.getElementById('darkModeBtn').textContent = '🌙'; }
            else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.getElementById('darkModeBtn').textContent = '☀️'; }
        }
        
        document.getElementById('darkModeBtn').onclick = toggleDarkMode;
        initDarkMode();
        
        // 验证码相关（模拟发送）
        let verificationCodes = {};
        
        window.adminSendCode = function() {
            const phone = document.getElementById('adminLoginPhone').value.trim();
            if (!/^1\d{10}$/.test(phone)) return alert('请输入正确的手机号');
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            verificationCodes[phone] = { code, expires: Date.now() + 5 * 60 * 1000 };
            
            alert(`验证码已发送（测试码：${code}）`);
            
            let countdown = 60;
            const btn = document.getElementById('adminSendCodeBtn');
            btn.disabled = true;
            btn.textContent = `${countdown}s`;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
        };
        
        window.adminLogin = function() {
            const phone = document.getElementById('adminLoginPhone').value.trim();
            const code = document.getElementById('adminLoginCode').value.trim();
            
            const adminPhones = ['17665124666', '13632736654'];
            
            if (!phone || !code) return alert('请填写手机号和验证码');
            if (!adminPhones.includes(phone)) return alert('此手机号不是管理员账号');
            
            const stored = verificationCodes[phone];
            if (!stored) return alert('请先获取验证码');
            if (Date.now() > stored.expires) return alert('验证码已过期，请重新获取');
            if (stored.code !== code) return alert('验证码错误');
            
            isLoggedIn = true;
            localStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('adminPage').classList.add('active');
            renderAdminProjects();
            renderAdminBookingCalendar();
            document.getElementById('serviceHoursDisplay').textContent = `${bookingSettings.startTime}:00 - ${bookingSettings.endTime}:00`;
            document.getElementById('serviceDurationDisplay').textContent = bookingSettings.duration;
            renderAdminBookings();
            renderRechargeList();
            renderCouponList();
            renderDiscountList();
        };
        
        // 手机号验证码登录
        window.loginWithCode = function() {
            const phone = document.getElementById('loginPhone').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            
            // 管理员手机号白名单

            document.getElementById('loginSubtitle').textContent = '请输入账号密码登录';
            document.getElementById('phoneLoginForm').style.display = 'none';
            document.getElementById('passwordLoginForm').style.display = 'block';

        window.showPhoneLogin = function() {
            document.getElementById('loginSubtitle').textContent = '请输入手机号登录';
            document.getElementById('phoneLoginForm').style.display = 'block';
            document.getElementById('passwordLoginForm').style.display = 'none';

        // 用户端登录

            document.getElementById('userLoginPage').classList.add('active');

        window.closeUserLogin = function() {

        };
        
        window.closeAdminLogin = function() {
            document.getElementById('loginPage').classList.remove('active');
        };
        
        window.sendUserCode = function() {
            const phone = document.getElementById('userLoginPhone').value.trim();
            if (!/^1\d{10}$/.test(phone)) return alert('请输入正确的手机号');
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            verificationCodes[phone] = { code, expires: Date.now() + 5 * 60 * 1000 };
            
            alert(`验证码已发送（测试码：${code}）`);
            
            let countdown = 60;
            const btn = document.getElementById('userSendCodeBtn');
            btn.disabled = true;
            btn.textContent = `${countdown}s`;
            
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}s`;
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '发送验证码';
                }
            }, 1000);
        };
        
        window.userLogin = function() {
            const phone = document.getElementById('userLoginPhone').value.trim();
            const code = document.getElementById('userLoginCode').value.trim();
            
            if (!phone || !code) return alert('请填写手机号和验证码');
            
            const stored = verificationCodes[phone];
            if (!stored) return alert('请先获取验证码');
            if (Date.now() > stored.expires) return alert('验证码已过期');
            if (stored.code !== code) return alert('验证码错误');
            
            // 查找或创建用户
            let user = users.find(u => u.phone === phone);
            if (!user) {
                user = {
                    id: Date.now().toString(),
                    name: '用户' + phone.slice(-4),
                    phone: phone,
                    balance: 0,
                    totalSpent: 0,
                    tags: [],
                    createdAt: new Date().toISOString()
                };
                users.push(user);
                localStorage.setItem('users', JSON.stringify(users));

            document.getElementById('userLoginBtn').textContent = user.name;
            document.getElementById('userLoginBtn').onclick = userLogout;

        function openProjectModal(project = null) {
            window.editingProjectId = project ? project.id : null;
            document.getElementById('projectModalTitle').textContent = project ? '编辑项目' : '添加项目';
            document.getElementById('projectName').value = project ? project.title : '';
            document.getElementById('projectDesc').value = project ? project.desc : '';
            document.getElementById('projectPrice').value = project ? project.price : '';
            document.getElementById('projectCategory').value = project ? project.category : '护肤';
            // 文件输入不能预设值，清空并提示
            document.getElementById('projectCover').value = '';
            document.getElementById('projectDetailText').value = project ? project.detailText : '';
            document.getElementById('projectDetailImages').value = '';
            document.getElementById('projectModal').classList.add('active');
        }
        
        function closeProjectModal() { document.getElementById('projectModal').classList.remove('active'); window.editingProjectId = null; }
        
        function editProject(id) { const p = window.adminProjects.find(item => item.id === id); if (p) openProjectModal(p); }
        
        // 图片转Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        // 处理多张图片
        async function handleDetailImages(files) {
            const base64Images = [];
            for (const file of files) {
                if (file.size > 2 * 1024 * 1024) {
                    alert('图片不能超过2MB');
                    continue;
                }
                const base64 = await fileToBase64(file);
                base64Images.push(base64);
            }
            return base64Images;
        }
        
        async function saveProject() {
            const title = document.getElementById('projectName').value.trim();
            const price = document.getElementById('projectPrice').value;
            if (!title || !price) return alert('请填写名称和价格');
            
            // 处理封面图片
            let coverBase64 = '';
            const coverFile = document.getElementById('projectCover').files[0];
            if (coverFile) {
                if (coverFile.size > 2 * 1024 * 1024) return alert('封面图片不能超过2MB');
                coverBase64 = await fileToBase64(coverFile);
            } else {
                // 如果没选新图片，保留原来的
                const existingProject = window.adminProjects.find(p => p.id === window.editingProjectId);
                if (existingProject) coverBase64 = existingProject.cover || '';
            }
            
            // 处理详情图片
            const detailFiles = document.getElementById('projectDetailImages').files;
            let detailImagesBase64 = [];
            if (detailFiles.length > 0) {
                detailImagesBase64 = await handleDetailImages(detailFiles);
            } else {
                const existingProject = window.adminProjects.find(p => p.id === window.editingProjectId);
                if (existingProject) detailImagesBase64 = existingProject.detailImages || [];
            }
            
            window.saveProjectToFirestore({ 
                title, 
                desc: document.getElementById('projectDesc').value, 
                price: parseInt(price), 
                category: document.getElementById('projectCategory').value, 
                cover: coverBase64, 
                detailText: document.getElementById('projectDetailText').value, 
                detailImages: detailImagesBase64 
            });
        }

        if (isLoggedIn) {

            renderAdminProjects();

            document.getElementById('serviceDurationDisplay').textContent = bookingSettings.duration;
            renderAdminBookings();
        }
