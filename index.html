<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽小站 - 美容预约管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #EC4899; --primary-light: #FDF2F8; --primary-dark: #831843; --secondary: #F9A8D4; --cta: #8B5CF6; --text: #1E1B4B; --text-light: #6B7280; --bg: #FDF2F8; --card: #FFF; --shadow: 0 4px 20px rgba(236,72,153,0.12); --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 70px; transition: all 0.3s; }
        h1,h2,h3 { font-family: 'Playfair Display', serif; }
        
        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--cta)); color: white; padding: 16px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; }
        .header-btns { display: flex; gap: 8px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        
        /* Tabs */
        .tabs { display: flex; background: var(--card); position: sticky; top: 54px; z-index: 99; border-bottom: 1px solid #eee; overflow-x: auto; }
        .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; color: var(--text-light); cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--primary); font-weight: 600; position: relative; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 3px; background: var(--primary); border-radius: 2px; }
        
        /* Content */
        .page { display: none; padding: 16px; }
        .page.active { display: block; }
        
        /* Grid */
        .grid { column-count: 2; column-gap: 12px; }
        .card { break-inside: avoid; background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow); }
        .card-img { width: 100%; display: block; }
        .card-body { padding: 12px; }
        .card-title { font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
        .card-price { font-size: 18px; font-weight: 700; color: var(--primary); }
        
        /* Booking */
        .date-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 12px; }
        .date-item { min-width: 50px; padding: 8px; background: var(--card); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); }
        .date-item.active { background: var(--primary); color: white; }
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .time-slot { padding: 12px; background: var(--card); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); }
        .time-slot.booked { background: #f0f0f0; color: #999; cursor: not-allowed; }
        .time-slot.selected { background: var(--primary); color: white; }
        
        /* Timeline */
        .timeline { position: relative; padding-left: 20px; border-left: 2px solid var(--primary); }
        .timeline-item { position: relative; margin-bottom: 20px; padding: 12px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
        .timeline-item::before { content: ''; position: absolute; left: -24px; top: 16px; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }
        .timeline-date { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
        .tag { display: inline-block; padding: 4px 10px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-size: 11px; margin-right: 4px; }
        
        /* Profile */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
        .stat-box { background: var(--card); padding: 16px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); }
        .stat-num { font-size: 24px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-light); }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .modal-close { font-size: 24px; cursor: pointer; }
        
        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; background: var(--bg); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(236,72,153,0.3); }
        
        /* Admin */
        .admin-panel { display: none; }
        .admin-panel.active { display: block; }
        .section { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .section-title { font-size: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .item-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-row:last-child { border: none; }
        
        /* Community */
        .post-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
        .post-title { font-weight: 600; margin-bottom: 8px; }
        .post-meta { font-size: 12px; color: var(--text-light); }
        
        /* Login */
        .login-card { background: white; border-radius: 20px; padding: 32px; text-align: center; }
        .login-title { color: var(--primary); margin-bottom: 8px; }
        
        /* Detail */
        .detail-view { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 150; overflow-y: auto; }
        .detail-view.active { display: block; }
        .detail-header { background: var(--primary); color: white; padding: 16px; display: flex; align-items: center; gap: 12px; }
        .detail-cover { width: 100%; border-radius: 0 0 20px 20px; margin-bottom: 16px; }
        .detail-content { padding: 16px; }
        .detail-price { font-size: 28px; font-weight: 700; color: var(--primary); margin: 16px 0; }
        
        .empty { text-align: center; padding: 40px; color: var(--text-light); }
    
        /* 增强样式 */
        .card { border-radius: 16px; box-shadow: 0 4px 20px rgba(236,72,153,0.12); transition: all 0.3s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(236,72,153,0.2); }
        
        .project-card { border-radius: 16px; overflow: hidden; }
        .project-card img { transition: transform 0.3s; }
        .project-card:hover img { transform: scale(1.05); }
        .project-price { 
            background: linear-gradient(135deg, #EC4899, #8B5CF6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .discount-badge {
            background: linear-gradient(135deg, #EF4444, #F97316);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .tabs { 
            background: linear-gradient(180deg, #FFF 0%, #FDF2F8 100%);
            border-bottom: 1px solid rgba(236,72,153,0.1);
        }
        .tab.active { 
            color: #EC4899; 
            font-weight: 600;
        }
        .tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 40px; height: 3px; 
            background: linear-gradient(90deg, #EC4899, #8B5CF6); 
            border-radius: 2px;
        }
        .tab span { font-size: 20px; display: block; margin-bottom: 2px; }
        
        .header {
            background: linear-gradient(135deg, #EC4899 0%, #8B5CF6 100%);
        }
        
        .btn {
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
            border: none;
            box-shadow: 0 4px 15px rgba(236,72,153,0.3);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236,72,153,0.4);
        }
        
        .stat-box {
            background: linear-gradient(135deg, #FDF2F8, #F3E8FF);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(236,72,153,0.1);
        }
        .stat-num {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 16px;
            border: 4px solid white;
            box-shadow: 0 4px 20px rgba(236,72,153,0.3);
        }
        .profile-name { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .profile-phone { text-align: center; color: #6B7280; }
        
        .date-item {
            border-radius: 12px;
            transition: all 0.3s;
            min-width: 60px;
        }
        .date-item.active {
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
            color: white;
            box-shadow: 0 4px 15px rgba(236,72,153,0.3);
        }
        
        .time-slot {
            border-radius: 12px;
            transition: all 0.3s;
        }
        .time-slot:hover { transform: scale(1.05); }
        .time-slot.selected {
            background: linear-gradient(135deg, #EC4899, #8B5CF6);
            color: white;
            box-shadow: 0 4px 15px rgba(236,72,153,0.4);
        }
        
        .modal-content {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(236,72,153,0.2);
        }
        
        .form-group input, .form-group textarea, .form-group select {
            border-radius: 12px;
            border: 2px solid #F3E8FF;
            padding: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #EC4899;
            box-shadow: 0 0 0 3px rgba(236,72,153,0.1);
            outline: none;
        }
        
        .login-card {
            background: linear-gradient(180deg, #FFF, #FDF2F8);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(236,72,153,0.2);
        }
        
        .menu-item {
            padding: 16px;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .menu-item:hover {
            background: linear-gradient(135deg, #FDF2F8, #F3E8FF);
        }
        
        .post-card {
            border-radius: 16px;
            transition: all 0.3s;
        }
        .post-card:hover {
            box-shadow: 0 8px 30px rgba(236,72,153,0.15);
        }
        
        .admin-panel {
            background: linear-gradient(180deg, #FDF2F8, #FFF);
        }
        
        h1, h2, h3, .project-title {
            font-family: 'Playfair Display', serif;
        }


        .profile-section { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(236,72,153,0.1); }
        .profile-section h3 { margin-bottom: 12px; font-size: 16px; }

</style>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBOPa-J7SpDyOSdWiy7gsA5re01Xd-FuvI",
    authDomain: "beauty-app-6527c.firebaseapp.com",
    projectId: "beauty-app-6527c",
    storageBucket: "beauty-app-6527c.firebasestorage.app",
    messagingSenderId: "396685995260",
    appId: "1:396685995260:web:0bb1a0676b339378a5bb79",
    databaseURL: "https://beauty-app-6527c-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function saveToFirebase(path, data) { db.ref(path).push().set(data); }

function syncData() {
    db.ref("projects").on("value", s => { if(s.val()) { projects = Object.values(s.val()); localStorage.setItem("adminProjects", JSON.stringify(projects)); if(typeof renderProjects==="function") renderProjects(); }});
    db.ref("rechargePlans").on("value", s => { if(s.val()) { rechargePlans = Object.values(s.val()); localStorage.setItem("rechargePlans", JSON.stringify(rechargePlans)); }});
    db.ref("users").on("value", s => { if(s.val()) { users = Object.values(s.val()); localStorage.setItem("users", JSON.stringify(users)); }});
    db.ref("bookings").on("value", s => { if(s.val()) { bookings = Object.values(s.val()); adminBookings = bookings; localStorage.setItem("bookings", JSON.stringify(bookings)); localStorage.setItem("adminBookings", JSON.stringify(bookings)); if(typeof renderProfile==="function") renderProfile(); }});
    db.ref("coupons").on("value", s => { if(s.val()) { coupons = Object.values(s.val()); localStorage.setItem("coupons", JSON.stringify(coupons)); }});
    db.ref("posts").on("value", s => { if(s.val()) { posts = Object.values(s.val()); localStorage.setItem("communityPosts", JSON.stringify(posts)); if(typeof renderPosts==="function") renderPosts(); }});
    db.ref("settings").on("value", s => { if(s.val()) { if(s.val().bookingSettings) { bookingSettings = s.val().bookingSettings; localStorage.setItem("bookingSettings", JSON.stringify(bookingSettings)); } }});
}
</script>

</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>✨ 美丽小站</h1>
        <div class="header-btns">
            <button class="header-btn" id="userBtn" onclick="openUserLogin()">登录</button>
            <button class="header-btn" onclick="setRoute('admin')">商家</button>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="projects">项目</div>
        <div class="tab" data-tab="booking">预约</div>
        <div class="tab" data-tab="community">社区</div>
        <div class="tab" data-tab="timeline">记录</div>
        <div class="tab" data-tab="profile">我的</div>
    </div>
    
    <!-- Pages -->
    <div class="page active" id="projects">
        <div class="grid" id="projectGrid"></div>
    </div>
    
    <div class="page" id="booking">
        <div class="date-scroll" id="dateScroll"></div>
        <div class="time-grid" id="timeSlots"></div>
    </div>
    
    <div class="page" id="community">
        <button class="btn" style="margin-bottom:16px" onclick="openPostModal()">+ 发布帖子</button>
        <div id="postList"></div>
    </div>
    
    <div class="page" id="timeline">
        <div class="timeline" id="timelineList"></div>
    </div>
    
    <div class="page" id="profile">
        <div id="profileContent"></div>
        <div class="section" id="myBookings"></div>
        <div class="section" id="myCoupons"></div>
        <button class="btn" style="background:#f44336" onclick="userLogout()">退出登录</button>
    </div>
    
    <!-- Detail View -->
    <div class="detail-view" id="detailView">
        <div class="detail-header">
            <button onclick="closeDetail()" style="background:none;border:none;color:white;font-size:24px">←</button>
            <span>项目详情</span>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>
    
    <!-- Modals -->
    <div class="modal" id="userLoginModal">
        <div class="login-card">
            <h2 class="login-title">👤 用户登录</h2>
            <div class="form-group"><input type="tel" id="userPhone" placeholder="手机号"></div>
            <div class="form-group">
                <div style="display:flex;gap:8px">
                    <input type="text" id="userCode" placeholder="验证码" style="flex:1">
                    <button onclick="sendUserCode()" style="background:var(--primary);color:white;border:none;padding:12px;border-radius:10px">发送</button>
                </div>
            </div>
            <button class="btn" onclick="doUserLogin()">登录</button>
            <button onclick="closeModal('userLoginModal')" style="margin-top:12px;background:none;border:none;color:var(--text-light)">取消</button>
        </div>
    </div>
    
    <div class="modal" id="adminModal">
        <div class="login-card">
            <h2 class="login-title">🔐 商家后台</h2>
            <div class="form-group"><input type="text" id="adminUser" placeholder="账号"></div>
            <div class="form-group"><form><input type="password" id="adminPass" placeholder="密码"></form></div>
            <button class="btn" onclick="doAdminLogin()">登录</button>
            <button onclick="closeModal('adminModal')" style="margin-top:12px;background:none;border:none;color:var(--text-light)">取消</button>
        </div>
    </div>
    
    <div class="modal" id="bookingModal">
        <div class="modal-content">
            <div class="modal-header"><h3>确认预约</h3><span class="modal-close" onclick="closeModal('bookingModal')">×</span></div>
            <div class="form-group"><input type="text" id="bookName" placeholder="姓名"></div>
            <div class="form-group"><input type="tel" id="bookPhone" placeholder="手机号"></div>
            <div class="form-group"><textarea id="bookNote" placeholder="备注" rows="2"></textarea></div>
            <button class="btn" onclick="confirmBooking()">确认</button>
        </div>
    </div>
    
    <div class="modal" id="postModal">
        <div class="modal-content">
            <div class="modal-header"><h3>发布帖子</h3><span class="modal-close" onclick="closeModal('postModal')">×</span></div>
            <div class="form-group"><input type="text" id="postTitle" placeholder="标题"></div>
            <div class="form-group"><textarea id="postContent" placeholder="内容" rows="4"></textarea></div>
            <button class="btn" onclick="submitPost()">发布</button>
        </div>
    </div>
    
    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="header" style="background:linear-gradient(135deg,#1a1a2e,#16213e)">
            <h1>🏪 商家后台</h1>
            <button class="header-btn" onclick="adminLogout()">退出</button>
        </div>
        <div style="padding:16px">
            <div class="section">
                <div class="section-title">👥 用户管理 <span id="userCount">0</span></div>
                <div id="adminUserList"></div>
            </div>
            <div class="section">
                <div class="section-title">📝 项目管理 <button onclick="openProjectForm()" style="background:var(--primary);color:white;border:none;padding:4px 12px;border-radius:8px;font-size:12px">+添加</button></div>
                <div id="adminProjectList"></div>
            </div>
            <div class="section">
                <div class="section-title">📅 预约列表</div>
                <div id="adminBookingList"></div>
            </div>
            <div class="section">
                <div class="section-title">💰 充值/优惠券/打折</div>
                <div class="form-group"><input type="text" id="rechargePlan" placeholder="充值方案 如:1000,100"></div>

                <div class="form-group"><input type="text" id="couponRule" placeholder="优惠券 如:满100减20,100,30"></div>
                <button class="btn" style="margin-bottom:8px" onclick="addCoupon()">添加优惠券</button>
                <div class="form-group"><input type="text" id="discountRule" placeholder="打折 如:项目ID,80(折扣)"></div>
                <button class="btn" onclick="addDiscount()">添加折扣</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="projectFormModal">
        <div class="modal-content">
            <div class="modal-header"><h3>项目</h3><span class="modal-close" onclick="closeModal('projectFormModal')">×</span></div>
            <div class="form-group"><input type="text" id="projTitle" placeholder="名称"></div>
            <div class="form-group"><input type="number" id="projPrice" placeholder="价格"></div>
            <div class="form-group"><textarea id="projDesc" placeholder="描述" rows="2"></textarea></div>
            <div class="form-group"><input type="url" id="projCover" placeholder="封面图URL"></div>
            <button class="btn" onclick="saveProject()">保存</button>
        </div>
    </div>
    
    <script>
        // Data
        let projects = JSON.parse(localStorage.getItem('adminProjects')) || [
            {id:1,title:'光子嫩肤',desc:'IPL光子技术，改善肤色',price:899,cover:'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=400'},
            {id:2,title:'水光针',desc:'深层补水锁水',price:1280,cover:'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400'},
            {id:3,title:'果酸换肤',desc:'温和去除老化角质',price:680,cover:'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=400'}
        ];
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
        let posts = JSON.parse(localStorage.getItem('posts')) || [];
        let rechargePlans = JSON.parse(localStorage.getItem('rechargePlans')) || [];
        let coupons = JSON.parse(localStorage.getItem('coupons')) || [];
        let discounts = JSON.parse(localStorage.getItem('discounts')) || [];
        
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let selectedDate = null, selectedTime = null;
        
        // Init
        document.getElementById('userBtn').textContent = currentUser ? currentUser.name || '我的' : '登录';
        if(isAdmin) showAdminPanel();
        renderProjects(); renderCalendar(); renderPosts(); renderTimeline(); renderProfile();
        
        // 路由功能
        function getRoute() { return location.hash.slice(1) || 'projects'; }
        function setRoute(route) { location.hash = route; }
        function renderRoute() {
            const route = getRoute();
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const tab = document.querySelector('.tabs .tab[data-tab="' + route + '"]');
            if(tab) tab.classList.add('active');
            const page = document.getElementById(route);
            if(page) page.classList.add('active');
            if(route === 'admin') { if(!isLoggedIn) { openAdmin(); } else { document.getElementById('adminPanel').classList.add('active'); } }
        }
        window.addEventListener('hashchange', renderRoute);
        document.querySelectorAll('.tabs .tab').forEach(tab => {
            tab.addEventListener('click', () => { setRoute(tab.dataset.tab); });
        });
        if(!location.hash) location.hash = 'projects';

        syncData();
        
        // Tabs
        document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            document.getElementById(t.dataset.tab).classList.add('active');
        });
        
        // Projects
        function renderProjects() {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = projects.map(p => {
                const disc = discounts.find(d => d.id == p.id);
                const price = disc ? (disc.type==='fixed'?disc.val:p.price*disc.val/100) : p.price;
                return `<div class="card" onclick="showDetail(${p.id})"><img src="${p.cover}" class="card-img"><div class="card-body"><div class="card-title">${p.title}</div><div class="card-desc">${p.desc}</div><div class="card-price">¥${price}${disc?'<small style="color:#999;text-decoration:line-through">¥'+p.price+'</small>':''}</div></div></div>`;
            }).join('');
        }
        
        function showDetail(id) {
            const p = projects.find(x => x.id == id);
            const disc = discounts.find(d => d.id == id);
            const price = disc ? (disc.type==='fixed'?disc.val:p.price*disc.val/100) : p.price;
            document.getElementById('detailContent').innerHTML = `<img src="${p.cover}" class="detail-cover"><h2>${p.title}</h2><div class="detail-price">¥${price}</div><p>${p.desc}</p><button class="btn" style="margin-top:16px" onclick="selectProjectForBooking(${p.id})">立即预约</button>`;
            document.getElementById('detailView').classList.add('active');
        }
        
        function closeDetail() { document.getElementById('detailView').classList.remove('active'); }
        
        // Calendar
        function renderCalendar() {
            const scroll = document.getElementById('dateScroll');
            let html = '';
            for(let i=0;i<14;i++){
                const d = new Date(); d.setDate(d.getDate()+i);
                const day = ['日','一','二','三','四','五','六'][d.getDay()];
                const date = d.toISOString().split('T')[0];
                html += `<div class="date-item ${i===0?'active':''}" onclick="selectDate('${date}',this)"><div>周${day}</div><div style="font-weight:600">${d.getDate()}</div></div>`;
            }
            scroll.innerHTML = html;
            selectedDate = new Date().toISOString().split('T')[0];
            renderTimeSlots();
        }
        
        function selectDate(date, el) {
            document.querySelectorAll('.date-item').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            selectedDate = date;
            renderTimeSlots();
        }
        
        function renderTimeSlots() {
            let html = '';
            for(let h=10;h<=21;h++){
                const booked = bookings.some(b => b.date === selectedDate && b.time === h+':00');
                html += `<div class="time-slot ${booked?'booked':''}" onclick="${booked?'':`selectTime('${h}:00',this)`}"><div>${h}:00</div><div style="font-size:11px">${booked?'已约':'可预约'}</div></div>`;
            }
            document.getElementById('timeSlots').innerHTML = html;
        }
        
        function selectTime(time, el) {
            document.querySelectorAll('.time-slot').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            selectedTime = time;
            if(!currentUser) return openUserLogin();
            document.getElementById('bookName').value = currentUser.phone || '';
            document.getElementById('bookPhone').value = currentUser.phone || '';
            document.getElementById('bookingModal').classList.add('active');
        }
        
        function confirmBooking() {
            const name = document.getElementById('bookName').value;
            const phone = document.getElementById('bookPhone').value;
            if(!name||!phone) return alert('请填写信息');
            const book = {id:Date.now(),date:selectedDate,time:selectedTime,name,phone,note:document.getElementById('bookNote').value};
            bookings.push(book);
            localStorage.setItem('bookings',JSON.stringify(bookings)); saveToFirebase('bookings', book);
            closeModal('bookingModal');
            renderTimeSlots();
            alert('预约成功！'); renderProfile(); if(typeof syncData==='function') syncData();
        }
        
        // Community
        function renderPosts() {
            const list = document.getElementById('postList');
            if(!posts.length) return list.innerHTML = '<div class="empty">暂无帖子</div>';
            list.innerHTML = posts.map(p => `<div class="post-card" onclick="viewPost(${p.id})"><div class="post-title">${p.title}</div><div class="post-meta">${p.author} · ${p.comments?.length||0}评论</div></div>`).join('');
        }
        
        function openPostModal() {
            if(!currentUser) return openUserLogin();
            document.getElementById('postModal').classList.add('active');
        }
        
        function submitPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title||!content) return alert('请填写内容');
            posts.unshift({id:Date.now(),title,content,author:currentUser.name||'用户',time:new Date().toLocaleDateString(),comments:[]});
            localStorage.setItem('posts',JSON.stringify(posts)); saveToFirebase('posts', {id:Date.now(),title,content,author:currentUser.name||'用户',time:new Date().toLocaleDateString(),comments:[]});
            closeModal('postModal');
            renderPosts();
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
        }
        
        function viewPost(id) {
            const p = posts.find(x => x.id == id);
            let html = `<h3>${p.title}</h3><p style="margin:12px 0">${p.content}</p><p style="color:var(--text-light);font-size:12px">${p.author} · ${p.time}</p>`;
            if(p.comments?.length){
                p.comments.forEach(c => { html += `<div style="background:var(--bg);padding:12px;border-radius:8px;margin:8px 0"><div style="font-weight:600;font-size:13px">${c.author}</div><div>${c.content}</div></div>`; });
            }
            if(currentUser){
                html += `<div style="margin-top:16px"><input type="text" id="commentInput" placeholder="评论" style="flex:1;padding:10px;border:1px solid #eee;border-radius:8px"><button onclick="addComment(${p.id})" style="background:var(--primary);color:white;border:none;padding:10px 16px;border-radius:8px">发送</button></div>`;
            }
            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('detailView').classList.add('active');
        }
        
        function addComment(pid) {
            const p = posts.find(x => x.id == pid);
            const input = document.getElementById('commentInput');
            if(!input.value) return;
            if(!p.comments) p.comments = [];
            p.comments.push({author:currentUser.name||'用户',content:input.value});
            localStorage.setItem('posts',JSON.stringify(posts)); saveToFirebase('posts', {id:Date.now(),title,content,author:currentUser.name||'用户',time:new Date().toLocaleDateString(),comments:[]});
            viewPost(pid);
        }
        
        // Timeline
        function renderTimeline() {
            const list = document.getElementById('timelineList');
            const myBooks = bookings.filter(b => currentUser && b.phone === currentUser.phone);
            if(!myBooks.length) return list.innerHTML = '<div class="empty">暂无记录</div>';
            const grouped = {};
            myBooks.forEach(b => { if(!grouped[b.date]) grouped[b.date] = []; grouped[b.date].push(b); });
            let html = '';
            Object.keys(grouped).sort().reverse().forEach(date => {
                html += `<div class="timeline-item"><div class="timeline-date">${date}</div>${grouped[date].map(b => `<span class="tag">${b.time} ${b.name}</span>`).join('')}</div>`;
            });
            list.innerHTML = html;
        }
        
        // Profile
        function renderProfile() {
            const c = document.getElementById("profileContent");
            if(!currentUser) {
                c.innerHTML = '<div class="empty">请先登录</div>';
                return;
            }
            const myBooks = bookings.filter(b => b.phone === currentUser.phone);
            
            let html = "";
            
            // 1. 个人信息
            html += '<div class="profile-section">';
            html += '<div class="profile-avatar" style="cursor:pointer" onclick="editAvatar()">' + (currentUser.avatar ? '<img src="' + currentUser.avatar + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover">' : (currentUser.name?.charAt(0) || '?')) + '</div>';
            html += '<div class="profile-name">' + (currentUser.name || '用户') + '</div>';
            html += '<div class="profile-phone">📱 ' + (currentUser.phone || '') + '</div>';
            html += '<button class="btn" style="margin-top:12px" onclick="editProfile()">✏️ 修改资料</button>';
            html += '</div>';
            
            // 2. 我的预约
            html += '<div class="profile-section"><h3>📅 我的预约</h3>';
            if(myBooks.length) {
                html += myBooks.map(b => '<div class="item-row"><span>' + b.date + ' ' + b.time + '</span><span>' + b.name + '</span></div>').join('');
            } else {
                html += '<div class="empty">暂无预约</div>';
            }
            html += '</div>';
            
            // 3. 余额及充值
            html += '<div class="profile-section">';
            html += '<h3>💰 余额</h3>';
            html += '<div style="text-align:center;padding:16px 0">';
            html += '<div style="font-size:36px;font-weight:700;color:#EC4899">¥' + (currentUser.balance||0) + '</div>';
            html += '<div style="color:#666;font-size:14px">累计消费 ¥' + (currentUser.totalSpent||0) + '</div>';
            html += '</div>';
            html += '<button class="btn" onclick="showRecharge()">💳 充值</button>';
            html += '</div>';
            
            // 4. 可用优惠券
            html += '<div class="profile-section"><h3>🎫 可用优惠券</h3>';
            if(coupons.length) {
                html += coupons.map(c => '<div class="item-row"><span>' + c.name + '</span><span>¥' + c.val + '</span></div>').join('');
            } else {
                html += '<div class="empty">暂无</div>';
            }
            html += '</div>';
            
            // 5. 退出登录
            html += '<div class="profile-section"><button class="btn" style="background:#6B7280" onclick="userLogout()">🚪 退出登录</button></div>';
            
            c.innerHTML = html;
        }
        
        window.editAvatar = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async function() {
                const file = this.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentUser.avatar = e.target.result;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    renderProfile();
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        window.showRecharge = function() {
            const list = document.getElementById('rechargeList');
            const plans = JSON.parse(localStorage.getItem("rechargePlans")) || [];
            if(!plans.length) {
                list.innerHTML = '<div class="empty">暂无可用充值方案</div>';
            } else {
                list.innerHTML = plans.map(p => '<div class="item-row"><div><strong>充¥' + p.amount + ' 送¥' + (p.bonus||0) + '</strong></div><button class="btn" style="width:auto;padding:8px 16px" onclick="doRecharge(' + p.amount + ')">充值</button></div>').join('');
            }
            document.getElementById('rechargeModal').classList.add('active');
        }
        
        window.closeRecharge = function() {
            document.getElementById('rechargeModal').classList.remove('active');
        }
        
        window.doRecharge = function(amount) {
            if(!confirm('确认充值 ¥' + amount + '？')) return;
            currentUser.balance = (currentUser.balance || 0) + amount;
            currentUser.totalSpent = (currentUser.totalSpent || 0) + amount;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            if(typeof saveToFirebase !== 'undefined') saveToFirebase('users', currentUser);
            closeRecharge();
            renderProfile();
            alert('充值成功！');
        }
            
            // 可用优惠券
            profileHTML += '<div class="profile-section"><h3>🎫 可用优惠券</h3>';
            if(coupons.length) {
                profileHTML += coupons.map(c => `<div class="item-row"><span>${c.name}</span><span>¥${c.val}</span></div>`).join('');
            } else {
                profileHTML += '<div class="empty">暂无</div>';
            }
            profileHTML += '</div>';
            
            // 退出登录
            profileHTML += '<div class="profile-section"><button class="btn" style="background:#6B7280" onclick="userLogout()">🚪 退出登录</button></div>';
            
            document.getElementById('myBookings').innerHTML = profileHTML;
            document.getElementById('myCoupons').innerHTML = '';
        }
        
        window.openRechargeModal = function() {
            if(!currentUser) { openUserLogin(); return; }
            let html = '<div style="padding:20px">';
            const plans = JSON.parse(localStorage.getItem("rechargePlans")) || [];
            if(!plans.length) {
                html += '<div class="empty">暂无可用充值方案</div>';
            } else {
                plans.forEach(p => {
                    html += '<div class="item-row"><div><strong>充¥' + p.amount + ' 送¥' + (p.bonus||0) + '</strong></div><button class="btn" style="width:auto;padding:8px 16px" onclick="doRecharge(' + p.amount + ')">充值</button></div>';
                });
            }
            html += '</div>';
            document.getElementById('myCoupons').innerHTML = html;
            document.getElementById('myCoupons').classList.add('active');
        }
        
        window.doRecharge = function(amount) {
            if(!confirm('确认充值 ¥' + amount + '？')) return;
            currentUser.balance = (currentUser.balance || 0) + amount; currentUser.totalSpent = (currentUser.totalSpent || 0) + amount;
            localStorage.setItem('currentUser', JSON.stringify(currentUser)); saveToFirebase('users', currentUser);
            renderProfile();
            alert('充值成功！');
        }
        
        window.editProfile = function() {
            const newName = prompt('请输入新名字:', currentUser.name || '');
            if(newName !== null) {
                currentUser.name = newName;
                localStorage.setItem('currentUser', JSON.stringify(currentUser)); saveToFirebase('users', currentUser);
                const idx = users.findIndex(u => u.id === currentUser.id);
                if(idx >= 0) { users[idx].name = newName; localStorage.setItem('users', JSON.stringify(users)); }
                renderProfile();
            }
        }
        
        // Login
        function openUserLogin() { document.getElementById('userLoginModal').classList.add('active'); }
        function openAdmin() { document.getElementById('adminModal').classList.add('active'); }
        
        function sendUserCode() {
            const phone = document.getElementById('userPhone').value;
            if(!/^1\d{10}$/.test(phone)) return alert('手机号格式错误');
            alert('验证码: 123456 (测试)');
        }
        
        function doUserLogin() {
            const phone = document.getElementById('userPhone').value;
            const code = document.getElementById('userCode').value;
            if(code !== '123456') return alert('验证码错误');
            let user = users.find(u => u.phone === phone);
            if(!user){ user = {id:Date.now(),phone,name:'用户'+phone.slice(-4),balance:0,tags:[]}; users.push(user); localStorage.setItem('users',JSON.stringify(users)); saveToFirebase('users', user); }
            currentUser = user;
            localStorage.setItem('currentUser',JSON.stringify(user));
            closeModal('userLoginModal');
            document.getElementById('userBtn').textContent = user.name;
            renderProfile();
        }
        
        function userLogout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('userBtn').textContent = '登录';
            renderProfile();
            alert('已退出');
        }
        
        function doAdminLogin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            if(user==='admin' && pass==='beauty123'){
                isAdmin = true;
                localStorage.setItem('isAdmin','true');
                closeModal('adminModal');
                showAdminPanel();
            }else{ alert('账号或密码错误'); }
        }
        
        function adminLogout() {
            isAdmin = false;
            localStorage.setItem('isAdmin','false');
            document.getElementById('adminPanel').classList.remove('active');
        }
        
        function showAdminPanel() {
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('userCount').textContent = users.length;
            document.getElementById('adminUserList').innerHTML = users.map(u => `<div class="item-row"><span>${u.name}</span><span>¥${u.balance||0}</span></div>`).join('') || '<div class="empty">暂无用户</div>';
            document.getElementById('adminProjectList').innerHTML = projects.map(p => `<div class="item-row"><span>${p.title}</span><span>¥${p.price}</span></div>`).join('') || '<div class="empty">暂无项目</div>';
            document.getElementById('adminBookingList').innerHTML = bookings.map(b => `<div class="item-row"><span>${b.date} ${b.time}</span><span>${b.name}</span></div>`).join('') || '<div class="empty">暂无预约</div>';
        }
        
        function openProjectForm() {
            document.getElementById('projectFormModal').classList.add('active');
        }
        
        function saveProject() {
            const title = document.getElementById('projTitle').value;
            const price = document.getElementById('projPrice').value;
            if(!title||!price) return alert('请填写名称和价格');
            projects.push({id:Date.now(),title,price,desc:document.getElementById('projDesc').value,cover:document.getElementById('projCover').value||'https://via.placeholder.com/400x300'});
            localStorage.setItem('projects',JSON.stringify(projects));
            closeModal('projectFormModal');
            renderProjects();
            showAdminPanel();
        }
        
        function selectProjectForBooking(pid) {
            document.querySelectorAll('.tab')[1].click();
            closeDetail();
        }
        
        function addRecharge() {
            const val = document.getElementById('rechargePlan').value;
            if(!val) return;
            rechargePlans.push({val});
            localStorage.setItem('rechargePlans',JSON.stringify(rechargePlans));
            alert('添加成功');
        }
        
        function addCoupon() {
            const val = document.getElementById('couponRule').value;
            if(!val) return;
            const parts = val.split(',');
            coupons.push({name:parts[0],min:parts[1],val:parts[2]});
            localStorage.setItem('coupons',JSON.stringify(coupons));
            alert('添加成功');
        }
        
        function addDiscount() {
            const val = document.getElementById('discountRule').value;
            if(!val) return;
            const parts = val.split(',');
            discounts.push({id:parts[0],type:'percent',val:parts[1]});
            localStorage.setItem('discounts',JSON.stringify(discounts));
            renderProjects();
            alert('添加成功');
        }
        
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
<div class="modal" id="rechargeModal"><div class="modal-content"><div class="modal-header"><h3>💰 充值</h3><span class="modal-close" onclick="closeRecharge()">×</span></div><div id="rechargeList"></div></div></div>
</body>
</html>
