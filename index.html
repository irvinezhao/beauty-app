<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽小站 - 美容项目管理</title>
    <style>
        :root {
            --primary: #e91e63;
            --primary-light: #fce4ec;
            --primary-dark: #c2185b;
            --text: #333;
            --text-light: #666;
            --bg: #f5f5f5;
            --card-bg: #fff;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
        }
        
        [data-theme="dark"] {
            --text: #f5f5f5;
            --text-light: #aaa;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-bottom: 80px;
            transition: background 0.3s, color 0.3s;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #ff6b9d 100%);
            color: white;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 20px; font-weight: 600; }
        
        .dark-mode-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        
        .tabs {
            display: flex;
            background: var(--card-bg);
            position: sticky;
            top: 60px;
            z-index: 99;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] .tabs { border-bottom-color: rgba(255,255,255,0.1); }
        
        .tab {
            flex: 1;
            padding: 16px 8px;
            text-align: center;
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
            position: relative;
        }
        
        .tab.active { color: var(--primary); font-weight: 600; }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }
        
        .content { padding: 16px; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        /* 项目 - 瀑布流 */
        .project-grid {
            column-count: 2;
            column-gap: 12px;
        }
        
        .project-card {
            break-inside: avoid;
            margin-bottom: 12px;
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .project-card:active { transform: scale(0.98); }
        
        .project-card img {
            width: 100%;
            display: block;
        }
        
        .project-info { padding: 12px; }
        
        .project-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .project-desc {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .project-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }
        
        /* 项目详情页 */
        .detail-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .detail-page.active { display: block; }
        
        .detail-header {
            background: var(--primary);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .detail-header button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        
        .detail-content { padding: 20px; }
        
        .detail-cover {
            width: 100%;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        
        .detail-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .detail-price {
            font-size: 24px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .detail-section {
            margin-bottom: 24px;
        }
        
        .detail-section h3 {
            font-size: 16px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] .detail-section h3 { border-bottom-color: rgba(255,255,255,0.1); }
        
        .detail-text { font-size: 14px; line-height: 1.8; color: var(--text-light); }
        
        .detail-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .detail-images img {
            width: 100%;
            border-radius: 12px;
        }
        
        /* 预约 - 日历视图 */
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .booking-header h2 { font-size: 18px; }
        
        .booking-date {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        
        .date-item {
            min-width: 50px;
            padding: 10px 8px;
            background: var(--card-bg);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        
        .date-item.active {
            background: var(--primary);
            color: white;
        }
        
        .date-day { font-size: 12px; }
        .date-num { font-size: 18px; font-weight: 600; }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .time-slot {
            padding: 16px 12px;
            background: var(--card-bg);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        
        .time-slot:hover { transform: scale(1.02); }
        
        .time-slot.booked {
            background: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }
        
        [data-theme="dark"] .time-slot.booked { background: #333; color: #666; }
        
        .time-slot.selected {
            background: var(--primary);
            color: white;
        }
        
        .slot-time { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .slot-status { font-size: 11px; }
        
        /* 预约弹窗 */
        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .booking-modal.active { display: flex; }
        
        .booking-modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 360px;
        }
        
        .booking-modal h3 { margin-bottom: 16px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        
        /* 拍照 - 时间轴 */
        .timeline { position: relative; padding-left: 24px; }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--primary);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 24px;
            padding: 16px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            border: 3px solid var(--bg);
        }
        
        .timeline-date {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .timeline-projects {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .timeline-tag {
            padding: 6px 12px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 20px;
            font-size: 13px;
        }
        
        .timeline-photos {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        
        .timeline-photos img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <h1>✨ 美丽小站</h1>
            <button class="dark-mode-btn" id="darkModeBtn" title="切换深色模式">🌙</button>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="projects">项目</div>
        <div class="tab" data-tab="booking">预约</div>
        <div class="tab" data-tab="timeline">记录</div>
    </div>
    
    <div class="content">
        <!-- 项目页面 -->
        <div class="page active" id="projects">
            <div class="project-grid" id="projectGrid"></div>
        </div>
        
        <!-- 预约页面 -->
        <div class="page" id="booking">
            <div class="booking-header">
                <h2>📅 可预约时间</h2>
            </div>
            <div class="booking-date" id="bookingDate"></div>
            <div class="time-slots" id="timeSlots"></div>
        </div>
        
        <!-- 时间轴页面 -->
        <div class="page" id="timeline">
            <div class="timeline" id="timelineList"></div>
        </div>
    </div>
    
    <!-- 项目详情页 -->
    <div class="detail-page" id="detailPage">
        <div class="detail-header">
            <button onclick="closeDetail()">←</button>
            <span>项目详情</span>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>
    
    <!-- 预约弹窗 -->
    <div class="booking-modal" id="bookingModal">
        <div class="booking-modal-content">
            <h3>📅 确认预约</h3>
            <div class="form-group">
                <label>您的姓名</label>
                <input type="text" id="bookingName" placeholder="请输入姓名">
            </div>
            <div class="form-group">
                <label>联系方式</label>
                <input type="tel" id="bookingPhone" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="bookingNote" placeholder="可选" rows="2"></textarea>
            </div>
            <button class="btn" onclick="confirmBooking()">确认预约</button>
            <button class="btn" style="margin-top:10px;background:#999" onclick="closeBookingModal()">取消</button>
        </div>
    </div>
    
    <script>
        // ========== 深色模式 ==========
        function initDarkMode() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('darkModeBtn').textContent = '☀️';
            }
        }
        
        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                document.getElementById('darkModeBtn').textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                document.getElementById('darkModeBtn').textContent = '☀️';
            }
        }
        
        document.getElementById('darkModeBtn').onclick = toggleDarkMode;
        initDarkMode();
        
        // ========== 数据 ==========
        const projects = [
            {
                id: 1,
                title: '光子嫩肤',
                desc: '采用IPL光子技术，改善肤色不均、色斑、毛孔粗大等问题',
                price: 899,
                cover: 'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=400',
                detailText: '光子嫩肤是一种非侵入性的皮肤美容技术，通过特定波长的强脉冲光作用于皮肤，产生光热作用和光化学作用。它可以：\n\n1. 改善肤色不均\n2. 淡化色斑\n3. 收缩毛孔\n4. 去除红血丝\n5. 刺激胶原蛋白再生',
                detailImages: [
                    'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=400',
                    'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=400'
                ]
            },
            {
                id: 2,
                title: '水光针',
                desc: '深层补水锁水，让肌肤水润透亮',
                price: 1280,
                cover: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400',
                detailText: '水光针是将透明质酸直接注入真皮层的治疗方法，让皮肤深层补水锁水。\n\n功效：\n1. 深层补水\n2. 改善细纹\n3. 提亮肤色\n4. 增加皮肤弹性',
                detailImages: [
                    'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400'
                ]
            },
            {
                id: 3,
                title: '果酸换肤',
                desc: '温和去除老化角质，改善肌肤粗糙',
                price: 680,
                cover: 'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=400',
                detailText: '果酸换肤通过使用不同浓度的果酸，促使老化角质层脱落，加速表皮细胞更新。\n\n适用：\n1. 痘痘肌\n2. 毛孔粗大\n3. 肤色暗沉\n4. 皮肤粗糙',
                detailImages: [
                    'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=400'
                ]
            },
            {
                id: 4,
                title: '小气泡清洁',
                desc: '深层清洁毛孔，去除黑头粉刺',
                price: 398,
                cover: 'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=400',
                detailText: '小气泡采用真空负压技术，配合专用的清洁溶液，能够：\n1. 深层清洁毛孔\n2. 去除黑头\n3. 清除粉刺\n4. 补水保湿',
                detailImages: [
                    'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=400'
                ]
            },
            {
                id: 5,
                title: '射频紧肤',
                desc: '刺激胶原蛋白再生，提升面部轮廓',
                price: 1680,
                cover: 'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=400',
                detailText: '射频技术通过加热真皮层，刺激胶原蛋白收缩和新生，达到紧肤效果。\n\n功效：\n1. 提升紧致\n2. 淡化皱纹\n3. 改善双下巴\n4. 塑造V脸',
                detailImages: [
                    'https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=400'
                ]
            },
            {
                id: 6,
                title: '纹眉',
                desc: '半永久纹眉，自然持久',
                price: 1580,
                cover: 'https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?w=400',
                detailText: '采用进口植物色料，纹出的眉毛自然立体，效果持久1-2年。\n\n服务内容：\n1. 眉形设计\n2. 手法纹绣\n3. 后期补色',
                detailImages: [
                    'https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?w=400'
                ]
            }
        ];
        
        // 模拟预约数据（实际应该从后端获取）
        const bookings = [];
        const currentWeek = getCurrentWeek();
        let selectedDate = null;
        let selectedTime = null;
        
        // ========== Tab切换 ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
        
        // ========== 项目渲染 ==========
        function renderProjects() {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = projects.map(p => `
                <div class="project-card" onclick="showDetail(${p.id})">
                    <img src="${p.cover}" alt="${p.title}">
                    <div class="project-info">
                        <div class="project-title">${p.title}</div>
                        <div class="project-desc">${p.desc}</div>
                        <div class="project-price">¥${p.price}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function showDetail(id) {
            const project = projects.find(p => p.id === id);
            const detailPage = document.getElementById('detailPage');
            const content = document.getElementById('detailContent');
            
            content.innerHTML = `
                <img src="${project.cover}" class="detail-cover">
                <div class="detail-title">${project.title}</div>
                <div class="detail-price">¥${project.price}</div>
                
                <div class="detail-section">
                    <h3>📝 项目介绍</h3>
                    <div class="detail-text">${project.detailText.replace(/\n/g, '<br>')}</div>
                </div>
                
                <div class="detail-section">
                    <h3>📷 效果图</h3>
                    <div class="detail-images">
                        ${project.detailImages.map(img => `<img src="${img}">`).join('')}
                    </div>
                </div>
            `;
            
            detailPage.classList.add('active');
        }
        
        function closeDetail() {
            document.getElementById('detailPage').classList.remove('active');
        }
        
        // ========== 预约功能 ==========
        function getCurrentWeek() {
            const week = [];
            const today = new Date();
            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                week.push({
                    day: ['日', '一', '二', '三', '四', '五', '六'][date.getDay()],
                    num: date.getDate(),
                    full: date.toISOString().split('T')[0]
                });
            }
            return week;
        }
        
        function renderBookingDates() {
            const container = document.getElementById('bookingDate');
            container.innerHTML = currentWeek.map((d, i) => `
                <div class="date-item ${i === 0 ? 'active' : ''}" onclick="selectDate(${i})">
                    <div class="date-day">周${d.day}</div>
                    <div class="date-num">${d.num}</div>
                </div>
            `).join('');
            selectedDate = currentWeek[0].full;
            renderTimeSlots();
        }
        
        function selectDate(index) {
            document.querySelectorAll('.date-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            selectedDate = currentWeek[index].full;
            selectedTime = null;
            renderTimeSlots();
        }
        
        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            const times = [];
            // 10:00 - 22:00，每小时一个时段
            for (let hour = 10; hour <= 21; hour++) {
                times.push(`${hour}:00`);
            }
            
            container.innerHTML = times.map(time => {
                const isBooked = Math.random() < 0.3; // 模拟30%已被预约
                return `
                    <div class="time-slot ${isBooked ? 'booked' : ''}" 
                         onclick="${isBooked ? '' : `selectTime('${time}')`}">
                        <div class="slot-time">${time}</div>
                        <div class="slot-status">${isBooked ? '已约满' : '可预约'}</div>
                    </div>
                `;
            }).join('');
        }
        
        function selectTime(time) {
            document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
            event.target.closest('.time-slot').classList.add('selected');
            selectedTime = time;
            // 延迟打开弹窗，让用户看到选择效果
            setTimeout(() => {
                document.getElementById('bookingModal').classList.add('active');
            }, 200);
        }
        
        function closeBookingModal() {
            document.getElementById('bookingModal').classList.remove('active');
            selectedTime = null;
            renderTimeSlots();
        }
        
        function confirmBooking() {
            const name = document.getElementById('bookingName').value.trim();
            const phone = document.getElementById('bookingPhone').value.trim();
            
            if (!name || !phone) {
                alert('请填写姓名和联系方式');
                return;
            }
            
            // 保存预约（实际应该发送到后端）
            bookings.push({
                date: selectedDate,
                time: selectedTime,
                name,
                phone,
                note: document.getElementById('bookingNote').value
            });
            
            alert('预约成功！我们会尽快与您联系确认');
            closeBookingModal();
            
            // 清空表单
            document.getElementById('bookingName').value = '';
            document.getElementById('bookingPhone').value = '';
            document.getElementById('bookingNote').value = '';
            
            // 刷新时间槽（模拟该时段被预约）
            renderTimeSlots();
        }
        
        // ========== 时间轴 ==========
        const timelineData = [
            {
                date: '2026-03-08',
                dateText: '3月8日',
                projects: ['光子嫩肤', '小气泡清洁', '果酸换肤'],
                photos: [
                    'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=200',
                    'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=200'
                ]
            },
            {
                date: '2026-02-14',
                dateText: '2月14日',
                projects: ['水光针', '射频紧肤'],
                photos: [
                    'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=200'
                ]
            },
            {
                date: '2026-01-20',
                dateText: '1月20日',
                projects: ['纹眉'],
                photos: [
                    'https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?w=200',
                    'https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?w=200'
                ]
            }
        ];
        
        function renderTimeline() {
            const container = document.getElementById('timelineList');
            
            if (timelineData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📸</div>
                        <p>暂无记录</p>
                        <p style="font-size:12px;margin-top:8px">完成美容项目后可在此查看</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = timelineData.map(item => `
                <div class="timeline-item">
                    <div class="timeline-date">${item.dateText}</div>
                    <div class="timeline-projects">
                        ${item.projects.map(p => `<span class="timeline-tag">${p}</span>`).join('')}
                    </div>
                    <div class="timeline-photos">
                        ${item.photos.map(photo => `<img src="${photo}">`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // ========== 初始化 ==========
        renderProjects();
        renderBookingDates();
        renderTimeline();
    </script>
</body>
