<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美丽小站 - 美容项目管理</title>
    <style>
        :root { --primary: #e91e63; --primary-light: #fce4ec; --primary-dark: #c2185b; --text: #333; --text-light: #666; --bg: #f5f5f5; --card-bg: #fff; --shadow: 0 2px 12px rgba(0,0,0,0.08); --radius: 16px; }
        [data-theme="dark"] { --text: #f5f5f5; --text-light: #aaa; --bg: #1a1a1a; --card-bg: #2d2d2d; --shadow: 0 2px 12px rgba(0,0,0,0.3); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding-bottom: 80px; transition: background 0.3s, color 0.3s; }
        .header { background: linear-gradient(135deg, var(--primary) 0%, #ff6b9d 100%); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .admin-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .dark-mode-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; }
        .tabs { display: flex; background: var(--card-bg); position: sticky; top: 60px; z-index: 99; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab { flex: 1; padding: 16px 8px; text-align: center; font-size: 14px; color: var(--text-light); cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); font-weight: 600; }
        .tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--primary); border-radius: 2px; }
        .content { padding: 16px; }
        .page { display: none; }
        .page.active { display: block; }
        .project-grid { column-count: 2; column-gap: 12px; }
        .project-card { break-inside: avoid; margin-bottom: 12px; background: var(--card-bg); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s; }
        .project-card:active { transform: scale(0.98); }
        .project-card img { width: 100%; display: block; }
        .project-info { padding: 12px; }
        .project-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .project-desc { font-size: 12px; color: var(--text-light); margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .project-price { font-size: 16px; font-weight: 700; color: var(--primary); }
        .detail-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 1000; overflow-y: auto; }
        .detail-page.active { display: block; }
        .detail-header { background: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
        .detail-header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .detail-content { padding: 20px; }
        .detail-cover { width: 100%; border-radius: var(--radius); margin-bottom: 20px; }
        .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .detail-price { font-size: 24px; color: var(--primary); font-weight: 700; margin-bottom: 20px; }
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .detail-text { font-size: 14px; line-height: 1.8; color: var(--text-light); }
        .detail-images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .detail-images img { width: 100%; border-radius: 12px; }
        .booking-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .booking-header h2 { font-size: 18px; }
        .booking-date { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 16px; }
        .date-item { min-width: 50px; padding: 10px 8px; background: var(--card-bg); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); }
        .date-item.active { background: var(--primary); color: white; }
        .date-day { font-size: 12px; }
        .date-num { font-size: 18px; font-weight: 600; }
        .time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .time-slot { padding: 16px 12px; background: var(--card-bg); border-radius: 12px; text-align: center; cursor: pointer; box-shadow: var(--shadow); transition: all 0.2s; }
        .time-slot:hover { transform: scale(1.02); }
        .time-slot.booked { background: #f0f0f0; color: #999; cursor: not-allowed; }
        .time-slot.selected { background: var(--primary); color: white; }
        .slot-time { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .slot-status { font-size: 11px; }
        .booking-modal, .login-page, .project-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .booking-modal.active, .login-page.active, .project-modal.active { display: flex; }
        .login-page { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); flex-direction: column; padding: 20px; }
        .project-modal { overflow-y: auto; padding: 20px; }
        .booking-modal-content, .project-modal-content { background: var(--card-bg); border-radius: 20px; padding: 24px; width: 90%; max-width: 360px; }
        .project-modal-content { max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .login-card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 320px; text-align: center; }
        .login-card h2 { color: var(--primary); margin-bottom: 8px; }
        .login-card p { color: var(--text-light); font-size: 14px; margin-bottom: 24px; }
        .booking-modal h3, .project-modal h3 { margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; width: 100%; cursor: pointer; }
        .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid #ddd; margin-top: 10px; }
        .timeline { position: relative; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--primary); }
        .timeline-item { position: relative; margin-bottom: 24px; padding: 16px; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); }
        .timeline-item::before { content: ''; position: absolute; left: -20px; top: 20px; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; border: 3px solid var(--bg); }
        .timeline-date { font-size: 13px; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        .timeline-projects { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .timeline-tag { padding: 6px 12px; background: var(--primary-light); color: var(--primary-dark); border-radius: 20px; font-size: 13px; }
        .timeline-photos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .timeline-photos img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .admin-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 1500; overflow-y: auto; }
        .admin-page.active { display: block; }
        .admin-header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { font-size: 18px; }
        .admin-content { padding: 20px; }
        .admin-section { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); }
        .admin-section h3 { font-size: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .admin-list-item:last-child { border-bottom: none; }
        .admin-item-info h4 { font-size: 15px; margin-bottom: 4px; }
        .admin-item-info p { font-size: 12px; color: var(--text-light); }
        .admin-item-actions { display: flex; gap: 8px; }
        .admin-btn-small { padding: 6px 12px; border-radius: 8px; font-size: 12px; border: none; cursor: pointer; }
        .admin-btn-edit { background: #2196F3; color: white; }
        .admin-btn-delete { background: #f44336; color: white; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    </style>
</head>
<body>
    <div class="header" id="userHeader">
        <div class="header-content">
            <h1>✨ 美丽小站</h1>
            <div class="header-right">
                <button class="admin-btn" onclick="openAdminLogin()">商家入口</button>
                <button class="dark-mode-btn" id="darkModeBtn" title="切换深色模式">🌙</button>
            </div>
        </div>
    </div>
    
    <div class="tabs" id="userTabs">
        <div class="tab active" data-tab="projects">项目</div>
        <div class="tab" data-tab="booking">预约</div>
        <div class="tab" data-tab="timeline">记录</div>
    </div>
    
    <div class="content" id="userContent">
        <div class="page active" id="projects"><div class="project-grid" id="projectGrid"></div></div>
        <div class="page" id="booking">
            <div class="booking-header"><h2>📅 可预约时间</h2></div>
            <div class="booking-date" id="bookingDate"></div>
            <div class="time-slots" id="timeSlots"></div>
        </div>
        <div class="page" id="timeline"><div class="timeline" id="timelineList"></div></div>
    </div>
    
    <div class="detail-page" id="detailPage">
        <div class="detail-header"><button onclick="closeDetail()">←</button><span>项目详情</span></div>
        <div class="detail-content" id="detailContent"></div>
    </div>
    
    <div class="booking-modal" id="bookingModal">
        <div class="booking-modal-content">
            <h3>📅 确认预约</h3>
            <div class="form-group"><label>您的姓名</label><input type="text" id="bookingName" placeholder="请输入姓名"></div>
            <div class="form-group"><label>联系方式</label><input type="tel" id="bookingPhone" placeholder="请输入手机号"></div>
            <div class="form-group"><label>备注</label><textarea id="bookingNote" placeholder="可选" rows="2"></textarea></div>
            <button class="btn" onclick="confirmBooking()">确认预约</button>
            <button class="btn btn-secondary" onclick="closeBookingModal()">取消</button>
        </div>
    </div>
    
    <div class="login-page" id="loginPage">
        <div class="login-card">
            <h2>🔐 商家后台</h2>
            <p>请输入账号密码登录</p>
            <div class="form-group"><label>账号</label><input type="text" id="loginUsername" placeholder="请输入账号"></div>
            <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码"></div>
            <button class="btn" onclick="loginWithPassword()">登录</button>
            <p id="loginError" style="color:red;font-size:12px;margin-top:10px;display:none">账号或密码错误</p>
        </div>
    </div>
    
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <h2>🏪 商家后台</h2>
            <button class="admin-btn" onclick="logoutAdmin()">退出登录</button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h3>美容项目 <button class="admin-btn-small admin-btn-edit" onclick="openProjectModal()">+ 添加项目</button></h3>
                <div id="adminProjectList"></div>
            </div>
            <div class="admin-section">
                <h3>预约管理</h3>
                <div id="adminBookingList"></div>
            </div>
        </div>
    </div>
    
    <div class="project-modal" id="projectModal">
        <div class="project-modal-content">
            <h3 id="projectModalTitle">添加项目</h3>
            <div class="form-group"><label>项目名称 *</label><input type="text" id="projectName" placeholder="如：光子嫩肤"></div>
            <div class="form-group"><label>简介描述</label><textarea id="projectDesc" placeholder="简要描述" rows="2"></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>价格 *</label><input type="number" id="projectPrice" placeholder="899"></div>
                <div class="form-group"><label>类别</label><select id="projectCategory"><option value="护肤">护肤</option><option value="美容">美容</option><option value="美甲">美甲</option><option value="美发">美发</option></select></div>
            </div>
            <div class="form-group"><label>封面图片URL</label><input type="url" id="projectCover" placeholder="https://..."></div>
            <div class="form-group"><label>详细介绍</label><textarea id="projectDetailText" placeholder="详细介绍内容" rows="4"></textarea></div>
            <div class="form-group"><label>详情图片URL（多张用逗号分隔）</label><input type="url" id="projectDetailImages" placeholder="https://..., https://..."></div>
            <button class="btn" onclick="saveProject()">保存</button>
            <button class="btn btn-secondary" onclick="closeProjectModal()">取消</button>
        </div>
    </div>
    
    <script>
        // 预设管理员账号
        const ADMIN_USER = {
            username: 'admin',
            password: 'beauty123',
            name: '管理员'
        };
        
        let isLoggedIn = false;
        
        function initDarkMode() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('darkModeBtn').textContent = '☀️'; }
        }
        
        function toggleDarkMode() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('theme', 'light'); document.getElementById('darkModeBtn').textContent = '🌙'; }
            else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); document.getElementById('darkModeBtn').textContent = '☀️'; }
        }
        
        document.getElementById('darkModeBtn').onclick = toggleDarkMode;
        initDarkMode();
        
        // 账号密码登录
        window.loginWithPassword = function() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (username === ADMIN_USER.username && password === ADMIN_USER.password) {
                isLoggedIn = true;
                errorEl.style.display = 'none';
                document.getElementById('loginPage').classList.remove('active');
                document.getElementById('adminPage').classList.add('active');
                renderAdminProjects();
                renderAdminBookings();
            } else {
                errorEl.style.display = 'block';
            }
        };
        
        window.logoutAdmin = function() {
            isLoggedIn = false;
            document.getElementById('adminPage').classList.remove('active');
        };
        
        // 项目管理数据（本地存储）
        window.adminProjects = JSON.parse(localStorage.getItem('adminProjects') || '[]');
        window.adminBookings = JSON.parse(localStorage.getItem('adminBookings') || '[]');
        
        // 保存到本地存储
        function saveAdminData() {
            localStorage.setItem('adminProjects', JSON.stringify(window.adminProjects));
            localStorage.setItem('adminBookings', JSON.stringify(window.adminBookings));
        }
        
        window.saveProjectToFirestore = function(data) {
            if (window.editingProjectId) {
                const index = window.adminProjects.findIndex(p => p.id === window.editingProjectId);
                if (index !== -1) {
                    window.adminProjects[index] = { ...window.adminProjects[index], ...data };
                }
            } else {
                window.adminProjects.push({ id: Date.now().toString(), ...data, createdAt: new Date().toISOString() });
            }
            saveAdminData();
            closeProjectModal();
            renderAdminProjects();
            renderUserProjects();
        };
        
        window.deleteProjectFromFirestore = function(id) {
            if (!confirm('确定删除?')) return;
            window.adminProjects = window.adminProjects.filter(p => p.id !== id);
            saveAdminData();
            renderAdminProjects();
            renderUserProjects();
        };
    </script>
    
    <script>
        const defaultProjects = [
            { id: 1, title: '光子嫩肤', desc: '采用IPL光子技术，改善肤色不均、色斑、毛孔粗大等问题', price: 899, category: '护肤', cover: 'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=400', detailText: '光子嫩肤是一种非侵入性的皮肤美容技术。\n\n1. 改善肤色不均\n2. 淡化色斑\n3. 收缩毛孔', detailImages: 'https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=400' },
            { id: 2, title: '水光针', desc: '深层补水锁水，让肌肤水润透亮', price: 1280, category: '护肤', cover: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400', detailText: '水光针是将透明质酸直接注入真皮层。', detailImages: 'https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=400' },
            { id: 3, title: '果酸换肤', desc: '温和去除老化角质，改善肌肤粗糙', price: 680, category: '美容', cover: 'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=400', detailText: '果酸换肤通过使用不同浓度的果酸。', detailImages: 'https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=400' }
        ];
        
        let projects = defaultProjects;
        let selectedDate = null;
        let selectedTime = null;
        
        document.querySelectorAll('#userTabs .tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('#userTabs .tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('#userContent .page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });
        
        function renderUserProjects() {
            const grid = document.getElementById('projectGrid');
            // 优先使用商家后台添加的项目，否则用默认
            const data = window.adminProjects.length > 0 ? window.adminProjects : projects;
            grid.innerHTML = data.map(p => `<div class="project-card" onclick="showDetail('${p.id}')"><img src="${p.cover || 'https://via.placeholder.com/400x300'}" alt="${p.title}"><div class="project-info"><div class="project-title">${p.title}</div><div class="project-desc">${p.desc || ''}</div><div class="project-price">¥${p.price}</div></div></div>`).join('');
        }
        
        function showDetail(id) {
            const data = window.adminProjects.length > 0 ? window.adminProjects : projects;
            const p = data.find(item => item.id == id || item.id === id);
            if (!p) return;
            const detailPage = document.getElementById('detailPage');
            const content = document.getElementById('detailContent');
            content.innerHTML = `<img src="${p.cover || 'https://via.placeholder.com/400x300'}" class="detail-cover"><div class="detail-title">${p.title}</div><div class="detail-price">¥${p.price}</div><div class="detail-section"><h3>📝 项目介绍</h3><div class="detail-text">${(p.detailText || p.desc || '').replace(/\n/g, '<br>')}</div></div>${p.detailImages ? `<div class="detail-section"><h3>📷 效果图</h3><div class="detail-images">${p.detailImages.split(',').map(img => `<img src="${img.trim()}">`).join('')}</div></div>` : ''}`;
            detailPage.classList.add('active');
        }
        
        function closeDetail() { document.getElementById('detailPage').classList.remove('active'); }
        
        const currentWeek = (() => { const week = []; const today = new Date(); for (let i = 0; i < 7; i++) { const date = new Date(today); date.setDate(today.getDate() + i); week.push({ day: ['日','一','二','三','四','五','六'][date.getDay()], num: date.getDate(), full: date.toISOString().split('T')[0] }); } return week; })();
        
        function renderBookingDates() { const container = document.getElementById('bookingDate'); container.innerHTML = currentWeek.map((d, i) => `<div class="date-item ${i===0?'active':''}" onclick="selectDate(${i})"><div class="date-day">周${d.day}</div><div class="date-num">${d.num}</div></div>`).join(''); selectedDate = currentWeek[0].full; renderTimeSlots(); }
        function selectDate(index) { document.querySelectorAll('.date-item').forEach((el, i) => el.classList.toggle('active', i === index)); selectedDate = currentWeek[index].full; selectedTime = null; renderTimeSlots(); }
        
        function renderTimeSlots() {
            const container = document.getElementById('timeSlots');
            let html = '';
            for (let hour = 10; hour <= 21; hour++) { const isBooked = Math.random() < 0.3; html += `<div class="time-slot ${isBooked?'booked':''}" onclick="${isBooked?'':`selectTime('${hour}:00')`}"><div class="slot-time">${hour}:00</div><div class="slot-status">${isBooked?'已约满':'可预约'}</div></div>`; }
            container.innerHTML = html;
        }
        
        function selectTime(time) { document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected')); event.target.closest('.time-slot').classList.add('selected'); selectedTime = time; setTimeout(() => document.getElementById('bookingModal').classList.add('active'), 200); }
        function closeBookingModal() { document.getElementById('bookingModal').classList.remove('active'); selectedTime = null; renderTimeSlots(); }
        
        async function confirmBooking() {
            const name = document.getElementById('bookingName').value.trim();
            const phone = document.getElementById('bookingPhone').value.trim();
            if (!name || !phone) return alert('请填写姓名和联系方式');
            
            // 保存到本地存储
            const booking = { 
                id: Date.now().toString(),
                date: selectedDate, 
                time: selectedTime, 
                name, 
                phone, 
                note: document.getElementById('bookingNote').value, 
                createdAt: new Date().toISOString() 
            };
            window.adminBookings.push(booking);
            localStorage.setItem('adminBookings', JSON.stringify(window.adminBookings));
            
            alert('预约成功！');
            closeBookingModal();
            document.getElementById('bookingName').value = ''; document.getElementById('bookingPhone').value = ''; document.getElementById('bookingNote').value = '';
        }
        
        const timelineData = [ { dateText: '3月8日', projects: ['光子嫩肤', '小气泡清洁', '果酸换肤'], photos: ['https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=200'] }, { dateText: '2月14日', projects: ['水光针'], photos: ['https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=200'] } ];
        
        function renderTimeline() { const container = document.getElementById('timelineList'); container.innerHTML = timelineData.map(item => `<div class="timeline-item"><div class="timeline-date">${item.dateText}</div><div class="timeline-projects">${item.projects.map(p => `<span class="timeline-tag">${p}</span>`).join('')}</div><div class="timeline-photos">${item.photos.map(photo => `<img src="${photo}">`).join('')}</div></div>`).join(''); }
        
        function openAdminLogin() { document.getElementById('loginPage').classList.add('active'); }
        
        function renderAdminProjects() {
            const list = document.getElementById('adminProjectList');
            const data = window.adminProjects;
            if (data.length === 0) { list.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px">暂无项目，请添加</p>'; return; }
            list.innerHTML = data.map(p => `<div class="admin-list-item"><div class="admin-item-info"><h4>${p.title}</h4><p>¥${p.price} · ${p.category || '未分类'}</p></div><div class="admin-item-actions"><button class="admin-btn-small admin-btn-edit" onclick="editProject('${p.id}')">编辑</button><button class="admin-btn-small admin-btn-delete" onclick="deleteProjectFromFirestore('${p.id}')">删除</button></div></div>`).join('');
        }
        
        function renderAdminBookings() {
            const list = document.getElementById('adminBookingList');
            const data = window.adminBookings;
            if (data.length === 0) { list.innerHTML = '<p style="color:var(--text-light);text-align:center;padding:20px">暂无预约</p>'; return; }
            list.innerHTML = data.map(b => `<div class="admin-list-item"><div class="admin-item-info"><h4>${b.name}</h4><p>${b.date} ${b.time} · ${b.phone}</p></div></div>`).join('');
        }
        
        function openProjectModal(project = null) {
            window.editingProjectId = project ? project.id : null;
            document.getElementById('projectModalTitle').textContent = project ? '编辑项目' : '添加项目';
            document.getElementById('projectName').value = project ? project.title : '';
            document.getElementById('projectDesc').value = project ? project.desc : '';
            document.getElementById('projectPrice').value = project ? project.price : '';
            document.getElementById('projectCategory').value = project ? project.category : '护肤';
            document.getElementById('projectCover').value = project ? project.cover : '';
            document.getElementById('projectDetailText').value = project ? project.detailText : '';
            document.getElementById('projectDetailImages').value = project ? project.detailImages : '';
            document.getElementById('projectModal').classList.add('active');
        }
        
        function closeProjectModal() { document.getElementById('projectModal').classList.remove('active'); window.editingProjectId = null; }
        
        function editProject(id) { const p = window.adminProjects.find(item => item.id === id); if (p) openProjectModal(p); }
        
        function saveProject() {
            const title = document.getElementById('projectName').value.trim();
            const price = document.getElementById('projectPrice').value;
            if (!title || !price) return alert('请填写名称和价格');
            window.saveProjectToFirestore({ title, desc: document.getElementById('projectDesc').value, price: parseInt(price), category: document.getElementById('projectCategory').value, cover: document.getElementById('projectCover').value, detailText: document.getElementById('projectDetailText').value, detailImages: document.getElementById('projectDetailImages').value });
        }
        
        renderUserProjects();
        renderBookingDates();
        renderTimeSlots();
        renderTimeline();
    </script>
</body>
</html>
